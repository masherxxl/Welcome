<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Room - 11101011</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff") format("woff");
      font-display: swap;
    }

    :root {
      --ink: #f8f8ff;
      --blue: #8ea2ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000000;
      color: var(--ink);
      font-family: "DeterminationK2", monospace;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      width: 100%;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .room-title {
      margin: 0 0 18px;
      color: #c8c8d4;
      font-size: clamp(18px, 5.2vw, 32px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    /*
      연구실 배경
      화면을 넓게 쓰고, 이미지도 살짝 확대
    */
    #room-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1.53 / 1;
      overflow: hidden;
      background: #000000;
    }

    #room-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      transform: scale(1.05);
      transform-origin: center;
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
    }

    /*
      플레이어
    */
    #player {
      position: absolute;
      left: 50%;
      top: 76%;
      z-index: 4;
      width: 5.4%;
      aspect-ratio: 14 / 22;
      transform: translate(-50%, -50%);
      pointer-events: none;
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.58));
    }

    #player::before {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid #0b0c14;
      background:
        linear-gradient(
          to bottom,
          #ffffff 0 27%,
          #d9def8 27% 58%,
          #8a94c0 58% 100%
        );
      clip-path: polygon(
        35% 0%,
        65% 0%,
        74% 10%,
        74% 28%,
        88% 42%,
        82% 57%,
        69% 57%,
        69% 100%,
        56% 100%,
        56% 73%,
        44% 73%,
        44% 100%,
        31% 100%,
        31% 57%,
        18% 57%,
        12% 42%,
        26% 28%,
        26% 10%
      );
    }

    #player::after {
      position: absolute;
      left: 40%;
      top: 18%;
      width: 20%;
      height: 9%;
      content: "";
      background: #05050a;
    }

    #player.walking {
      animation: player-bob 0.17s steps(2, end) infinite;
    }

    @keyframes player-bob {
      50% {
        transform: translate(-50%, calc(-50% + 1px));
      }
    }

    /*
      시작 화면의 작은 조이스틱 위치
    */
    #stage-controller-slot {
      position: absolute;
      right: 2.5%;
      bottom: 3%;
      z-index: 8;
      width: clamp(72px, 19vw, 108px);
      aspect-ratio: 1 / 1;
    }

    /*
      T1
      파일명: T1.png
      PNG 투명 여백을 CSS로 잘라 실제 테두리만 사용
    */
    #main-dialog {
      position: relative;
      width: 100%;
      aspect-ratio: 2.58 / 1;
      margin-top: 20px;
      overflow: hidden;
    }

    #main-dialog .frame-crop {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #main-dialog .frame-crop img {
      position: absolute;
      left: -7.17%;
      top: -14.71%;
      width: 115.71%;
      height: 129.9%;
      max-width: none;
      pointer-events: none;
      user-select: none;
      image-rendering: pixelated;
    }

    #main-dialog .content {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 25%;
      gap: 3%;
      padding: 17% 8% 13% 7%;
    }

    #main-text {
      align-self: start;
      font-size: clamp(15px, 4.05vw, 29px);
      line-height: 1.25;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    #choice-column {
      align-self: start;
      display: grid;
      gap: 19%;
      padding-top: 1%;
    }

    .yn-choice {
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(15px, 4.05vw, 29px);
      line-height: 1.1;
      text-align: left;
      cursor: pointer;
    }

    .yn-choice.active {
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.72);
    }

    /*
      T0 넓게 + 조이스틱 작게
    */
    #bottom-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34%;
      gap: 16px;
      align-items: end;
      margin-top: 14px;
    }

    /*
      T0
      파일명: T0.PNG
    */
    #action-dialog {
      position: relative;
      width: 100%;
      aspect-ratio: 2.08 / 1;
      overflow: hidden;
    }

    #action-dialog .frame-crop {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #action-dialog .frame-crop img {
      position: absolute;
      left: -3.88%;
      top: -11.44%;
      width: 108.77%;
      height: 121.98%;
      max-width: none;
      pointer-events: none;
      user-select: none;
      image-rendering: pixelated;
    }

    #action-dialog .content {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: start;
      gap: 5.5%;
      padding: 13% 8% 11%;
    }

    .action-btn {
      display: block;
      width: max-content;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(12px, 3.45vw, 25px);
      line-height: 1.02;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .action-btn:focus-visible,
    .action-btn:active {
      outline: 0;
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.75);
    }

    #bottom-controller-slot {
      position: relative;
      aspect-ratio: 1 / 1;
      min-width: 0;
      min-height: 0;
    }

    /*
      실제 조이스틱 패널
      설명 텍스트는 넣지 않음
    */
    #controller {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 2px solid rgba(142, 162, 255, 0.88);
      background: linear-gradient(#080814, #000000);
      box-shadow:
        inset 0 0 0 4px #000000,
        inset 0 0 0 6px rgba(142, 162, 255, 0.24),
        0 0 8px rgba(142, 162, 255, 0.16);
    }

    #controller::before {
      position: absolute;
      inset: 6px;
      content: "";
      border: 1px solid rgba(142, 162, 255, 0.36);
      pointer-events: none;
    }

    .controller-inner {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      align-items: center;
      justify-items: center;
      padding: 10% 12% 9%;
      gap: 7%;
    }

    #interact-button {
      width: 43%;
      min-width: 32px;
      aspect-ratio: 1 / 0.72;
      border: 1px solid var(--blue);
      background: #06060c;
      color: #ffffff;
      padding: 0;
      font-size: clamp(11px, 3.1vw, 20px);
      line-height: 1;
      cursor: pointer;
    }

    #joystick-base {
      position: relative;
      align-self: end;
      width: 77%;
      aspect-ratio: 1 / 1;
      border: 2px solid rgba(142, 162, 255, 0.8);
      border-radius: 50%;
      background:
        radial-gradient(
          circle,
          rgba(142, 162, 255, 0.08) 0 42%,
          transparent 43%
        ),
        radial-gradient(
          circle,
          #1d2134 0 59%,
          #111420 60% 100%
        );
      box-shadow:
        inset 0 0 0 6px rgba(142, 162, 255, 0.06),
        0 0 7px rgba(142, 162, 255, 0.15);
      touch-action: none;
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 43%;
      aspect-ratio: 1 / 1;
      border: 2px solid #090a10;
      border-radius: 50%;
      background:
        radial-gradient(
          circle at 36% 31%,
          #ffffff 0 23%,
          #dde1f7 24% 52%,
          #9ca7d9 53%
        );
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #cut-overlay {
      position: fixed;
      inset: 0;
      z-index: 99;
      background: #000000;
      opacity: 0;
      pointer-events: none;
    }

    #cut-overlay.active {
      opacity: 1;
      animation: cut 0.22s steps(2, end) both;
    }

    @keyframes cut {
      30% {
        background: #ffffff;
      }

      100% {
        background: #000000;
        opacity: 1;
      }
    }

    @media (min-width: 700px) {
      #app {
        width: min(92vw, 940px);
        padding: 24px 24px 34px;
      }

      .room-title {
        margin-bottom: 22px;
        font-size: 32px;
      }

      #stage-controller-slot {
        width: min(18vw, 150px);
      }

      #main-text,
      .yn-choice {
        font-size: 30px;
      }

      .action-btn {
        font-size: 24px;
      }
    }

    @media (max-width: 360px) {
      #app {
        padding-inline: 10px;
      }

      #bottom-row {
        gap: 10px;
      }

      .action-btn {
        font-size: 11px;
      }

      #main-text,
      .yn-choice {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <h1 class="room-title">Room- 11101011</h1>

    <section id="room-stage" aria-label="미니 연구실">
      <img id="room-bg" src="./room-bg.png" alt="">
      <div id="player" aria-hidden="true"></div>

      <div id="stage-controller-slot"></div>
    </section>

    <!-- T1: 1. 확인한다를 누른 뒤에만 표시 -->
    <section id="main-dialog" hidden aria-live="polite">
      <div class="frame-crop">
        <img src="./T1.png" alt="">
      </div>

      <div class="content">
        <div id="main-text"></div>

        <div id="choice-column" hidden>
          <button class="yn-choice active" id="choice-yes" type="button">
            • 네
          </button>

          <button class="yn-choice" id="choice-no" type="button">
            • 아니오
          </button>
        </div>
      </div>
    </section>

    <!-- T0: A 버튼으로 조사했을 때만 표시 -->
    <section id="bottom-row" hidden aria-label="행동 선택">
      <section id="action-dialog">
        <div class="frame-crop">
          <img src="./T0.PNG" alt="">
        </div>

        <div class="content">
          <button class="action-btn" data-action="inspect" type="button">
            1. 확인한다
          </button>

          <button class="action-btn" data-action="drop" type="button">
            2. 바닥으로 버린다.
          </button>

          <button class="action-btn" data-action="peek" type="button">
            3. 안을 자세히 들여다 본다.
          </button>

          <button class="action-btn" data-action="back" type="button">
            4. 돌아간다
          </button>
        </div>
      </section>

      <div id="bottom-controller-slot"></div>
    </section>

    <section id="controller" aria-label="조작 패널">
      <div class="controller-inner">
        <button id="interact-button" type="button" aria-label="조사">
          A
        </button>

        <div id="joystick-base" aria-label="이동 조이스틱">
          <div id="joystick-knob"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="cut-overlay" aria-hidden="true"></div>

  <script>
    const NO_ROOM_URL = "no-room.html";

    const OBJECTS = [
      {
        id: "screen01",
        x: 15,
        y: 56,
        description:
          "스크린에는 오래된 관측 로그가 남아 있다.\n같은 좌표를 반복해서 가리키는 흔적만 남아 있다."
      },
      {
        id: "screen02",
        x: 50,
        y: 56,
        description:
          "화면 안쪽에는 흐릿한 도면이 열려 있다.\n출입문이 아니라, 안쪽으로 향하는 틈처럼 보인다."
      },
      {
        id: "screen03",
        x: 84,
        y: 56,
        description:
          "스크린 표면은 멀쩡해 보인다.\n하지만 안쪽에서 미세한 떨림이 계속 느껴진다."
      }
    ];

    const $ = (selector) => document.querySelector(selector);

    const stageControllerSlot = $("#stage-controller-slot");
    const bottomControllerSlot = $("#bottom-controller-slot");
    const controller = $("#controller");

    const player = $("#player");
    const mainDialog = $("#main-dialog");
    const mainText = $("#main-text");
    const choiceColumn = $("#choice-column");
    const choiceYes = $("#choice-yes");
    const choiceNo = $("#choice-no");

    const bottomRow = $("#bottom-row");
    const interactButton = $("#interact-button");
    const joystickBase = $("#joystick-base");
    const joystickKnob = $("#joystick-knob");
    const cutOverlay = $("#cut-overlay");

    const actionButtons = [
      ...document.querySelectorAll(".action-btn")
    ];

    const state = {
      mode: "free",
      playerX: 50,
      playerY: 75,
      activeId: null,
      selectedYN: "yes",
      removed: new Set()
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const joystick = {
      active: false,
      x: 0,
      y: 0
    };

    const clamp = (value, min, max) =>
      Math.max(min, Math.min(max, value));

    const byId = (id) =>
      OBJECTS.find((item) => item.id === id) || null;

    const distance = (a, b, c, d) =>
      Math.hypot(a - c, b - d);

    function moveController(target) {
      target.append(controller);
    }

    function updatePlayer() {
      player.style.left = `${state.playerX}%`;
      player.style.top = `${state.playerY}%`;
    }

    function nearestObject() {
      let closest = null;
      let shortest = Infinity;

      for (const item of OBJECTS) {
        if (state.removed.has(item.id)) {
          continue;
        }

        const currentDistance = distance(
          state.playerX,
          state.playerY,
          item.x,
          item.y
        );

        if (currentDistance < shortest) {
          shortest = currentDistance;
          closest = item;
        }
      }

      return shortest <= 12 ? closest : null;
    }

    function updateYN() {
      choiceYes.classList.toggle(
        "active",
        state.selectedYN === "yes"
      );

      choiceNo.classList.toggle(
        "active",
        state.selectedYN === "no"
      );
    }

    function closePanels() {
      state.mode = "free";
      state.activeId = null;

      mainDialog.hidden = true;
      bottomRow.hidden = true;
      choiceColumn.hidden = true;

      moveController(stageControllerSlot);
    }

    function openActionMenu(item) {
      state.mode = "action";
      state.activeId = item.id;

      mainDialog.hidden = true;
      choiceColumn.hidden = true;
      bottomRow.hidden = false;

      moveController(bottomControllerSlot);
    }

    function openQuestion(item) {
      state.mode = "question";
      state.activeId = item.id;
      state.selectedYN = "yes";

      mainText.textContent = "스크린을 확인하시겠습니까?";

      choiceColumn.hidden = false;
      mainDialog.hidden = false;
      bottomRow.hidden = false;

      moveController(bottomControllerSlot);
      updateYN();
    }

    function openMessage(text) {
      state.mode = "message";

      mainText.textContent = text;

      choiceColumn.hidden = true;
      mainDialog.hidden = false;
      bottomRow.hidden = false;

      moveController(bottomControllerSlot);
    }

    function chooseYN(value) {
      if (state.mode !== "question") {
        return;
      }

      const item = byId(state.activeId);

      if (!item) {
        closePanels();
        return;
      }

      if (value === "yes") {
        openMessage(item.description);
      } else {
        openActionMenu(item);
      }
    }

    function runAction(action) {
      const item = byId(state.activeId);

      if (action === "back") {
        closePanels();
        return;
      }

      if (!item) {
        closePanels();
        return;
      }

      if (action === "inspect") {
        openQuestion(item);
        return;
      }

      if (action === "drop") {
        state.removed.add(item.id);
        openMessage("스크린을 바닥으로 버렸다.");
        return;
      }

      if (action === "peek") {
        state.mode = "cut";
        cutOverlay.classList.add("active");

        window.setTimeout(() => {
          window.location.href = NO_ROOM_URL;
        }, 240);
      }
    }

    function interact() {
      if (state.mode === "question") {
        chooseYN(state.selectedYN);
        return;
      }

      if (state.mode === "message") {
        closePanels();
        return;
      }

      if (state.mode === "action") {
        return;
      }

      const item = nearestObject();

      if (item) {
        openActionMenu(item);
      }
    }

    function getMoveVector() {
      if (joystick.active) {
        return {
          x: joystick.x,
          y: joystick.y
        };
      }

      const rawX =
        (keys.right ? 1 : 0) -
        (keys.left ? 1 : 0);

      const rawY =
        (keys.down ? 1 : 0) -
        (keys.up ? 1 : 0);

      const length = Math.hypot(rawX, rawY) || 1;

      return {
        x: rawX / length,
        y: rawY / length
      };
    }

    function setJoystick(clientX, clientY) {
      const rect = joystickBase.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const maxRadius = rect.width * 0.28;

      const dx = clientX - centerX;
      const dy = clientY - centerY;

      const length = Math.hypot(dx, dy) || 1;
      const limited = Math.min(length, maxRadius);

      joystick.x =
        (dx / length) *
        (limited / maxRadius);

      joystick.y =
        (dy / length) *
        (limited / maxRadius);

      const knobX = joystick.x * rect.width * 0.22;
      const knobY = joystick.y * rect.width * 0.22;

      joystickKnob.style.transform =
        `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.x = 0;
      joystick.y = 0;

      joystickKnob.style.transform =
        "translate(-50%, -50%)";
    }

    joystickBase.addEventListener("pointerdown", (event) => {
      joystick.active = true;
      joystickBase.setPointerCapture(event.pointerId);

      setJoystick(event.clientX, event.clientY);
    });

    joystickBase.addEventListener("pointermove", (event) => {
      if (joystick.active) {
        setJoystick(event.clientX, event.clientY);
      }
    });

    joystickBase.addEventListener("pointerup", resetJoystick);
    joystickBase.addEventListener("pointercancel", resetJoystick);

    interactButton.addEventListener("click", interact);

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        runAction(button.dataset.action);
      });
    });

    choiceYes.addEventListener("click", () => {
      chooseYN("yes");
    });

    choiceNo.addEventListener("click", () => {
      chooseYN("no");
    });

    mainDialog.addEventListener("click", () => {
      if (state.mode === "message") {
        closePanels();
      }
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      const controlledKeys = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "e",
        " ",
        "enter",
        "1",
        "2",
        "3",
        "4",
        "escape"
      ];

      if (controlledKeys.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        keys.up = true;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = true;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = true;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = true;
      }

      if (key === "e" || key === "enter") {
        interact();
      }

      if (state.mode === "question") {
        if (key === "arrowup" || key === "arrowleft") {
          state.selectedYN = "yes";
          updateYN();
        }

        if (key === "arrowdown" || key === "arrowright") {
          state.selectedYN = "no";
          updateYN();
        }

        if (key === " ") {
          chooseYN(state.selectedYN);
        }
      }

      if (state.mode === "action") {
        if (key === "1") {
          runAction("inspect");
        }

        if (key === "2") {
          runAction("drop");
        }

        if (key === "3") {
          runAction("peek");
        }

        if (key === "4" || key === "escape") {
          runAction("back");
        }
      }

      if (state.mode === "message" && key === " ") {
        closePanels();
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") {
        keys.up = false;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = false;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = false;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = false;
      }
    });

    let lastTime = performance.now();

    function loop(now) {
      const delta = Math.min(
        (now - lastTime) / 1000,
        0.05
      );

      lastTime = now;

      if (state.mode === "free") {
        const vector = getMoveVector();

        const moving =
          vector.x !== 0 ||
          vector.y !== 0;

        player.classList.toggle("walking", moving);

        if (moving) {
          state.playerX = clamp(
            state.playerX + vector.x * 20 * delta,
            7,
            93
          );

          state.playerY = clamp(
            state.playerY + vector.y * 20 * delta,
            46,
            88
          );

          updatePlayer();
        }
      } else {
        player.classList.remove("walking");
      }

      requestAnimationFrame(loop);
    }

    updatePlayer();
    closePanels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
