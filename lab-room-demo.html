<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Room - 11101011</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff") format("woff");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "DeterminationK2", monospace;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 30px 14px 46px;
    }

    /*
      맨 위 제목.
      효과 없음 / 모션 없음 / 회색 / 조금 아래 / 조금 크게.
    */
    .room-title {
      margin: 16px 0 0;
      color: #9c9ca8;
      font-size: clamp(20px, 5.8vw, 34px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: .035em;
    }

    /*
      언더테일식 타이핑:
      글자는 딱딱하게 찍히고,
      일부 글자만 아주 짧게 잔떨림/글로우.
    */
    .typed-target {
      position: relative;
    }

    .typed-char {
      display: inline-block;
      min-width: .08em;
      opacity: 0;
      transform: translate(0, 0);
      animation: type-pop .035s steps(1, end) forwards;
    }

    .typed-char.glitch {
      animation:
        type-pop .035s steps(1, end) forwards,
        tiny-jitter .18s steps(2, end) .04s 1;
    }

    .typed-char.glow {
      animation:
        type-pop .035s steps(1, end) forwards,
        tiny-glow .28s steps(2, end) .04s 1;
    }

    @keyframes type-pop {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes tiny-jitter {
      0%,
      100% {
        transform: translate(0, 0);
        filter: brightness(1);
      }

      35% {
        transform: translate(-1px, 0);
        filter: brightness(1.25);
      }

      70% {
        transform: translate(1px, -1px);
        filter: brightness(1);
      }
    }

    @keyframes tiny-glow {
      0%,
      100% {
        text-shadow: none;
        filter: brightness(1);
      }

      45% {
        text-shadow: 0 0 4px rgba(255,255,255,.75);
        filter: brightness(1.55);
      }
    }

    /*
      새 글자가 찍힐 때 대화창이 아주 짧게 반응.
    */
    .screen-react {
      animation: screen-react .12s steps(2, end) both;
    }

    @keyframes screen-react {
      0% {
        filter: brightness(1);
        transform: translate(0, 0);
      }

      45% {
        filter: brightness(1.18);
        transform: translate(1px, 0);
      }

      100% {
        filter: brightness(1);
        transform: translate(0, 0);
      }
    }

    /*
      게임 본 화면 위치.
      여기 숫자를 올리면 게임 화면 전체가 더 아래로 내려갑니다.
    */
    #room-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1.52 / 1;

      /* 게임 본 화면 아래로 내리는 곳 */
      margin-top: clamp(94px, 23vw, 120px);

      overflow: hidden;
      background: #000;
    }

    #room-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 49%;
      transform: scale(1.17);
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
    }

    #stage-effects {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .removed-cover {
      position: absolute;
      border: 2px solid rgba(255,255,255,.58);
      background: #050507;
      box-shadow: 0 0 8px rgba(255,255,255,.12);
    }

    #player {
      position: absolute;
      left: 50%;
      top: 76%;
      z-index: 2;
      width: 5.5%;
      aspect-ratio: 14 / 22;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 2px rgba(255,255,255,.6));
      pointer-events: none;
    }

    #player::before {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid #0b0c14;
      background: linear-gradient(
        to bottom,
        #fff 0 27%,
        #d9def8 27% 58%,
        #8a94c0 58% 100%
      );
      clip-path: polygon(
        35% 0%, 65% 0%, 74% 10%, 74% 28%, 88% 42%, 82% 57%,
        69% 57%, 69% 100%, 56% 100%, 56% 73%, 44% 73%, 44% 100%,
        31% 100%, 31% 57%, 18% 57%, 12% 42%, 26% 28%, 26% 10%
      );
    }

    #player::after {
      position: absolute;
      left: 40%;
      top: 18%;
      width: 20%;
      height: 9%;
      content: "";
      background: #05050a;
    }

    #player.walking {
      animation: player-bob .15s steps(2,end) infinite;
    }

    @keyframes player-bob {
      50% {
        transform: translate(-50%, calc(-50% + 1px));
      }
    }

    /*
      스크린의 세모 문양 바로 위 확인 버튼.
      가까이 가면 부드럽게 나타나고,
      멀어지면 같은 속도로 스르르 사라집니다.
    */
    #confirm-button {
      position: absolute;
      z-index: 5;
      min-width: 82px;
      padding: 10px 17px 9px;
      border: 3px solid #fff;
      background: #000;
      color: #fff;
      font-size: clamp(15px, 4vw, 23px);
      line-height: 1;
      letter-spacing: .04em;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, calc(-50% + 10px)) scale(.9);
      box-shadow:
        0 0 0 3px #000,
        0 0 10px rgba(255,255,255,.3);

      transition:
        opacity .34s ease,
        transform .34s cubic-bezier(.2,.8,.25,1),
        filter .34s ease,
        visibility 0s linear .34s;

      cursor: pointer;
    }

    #confirm-button.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      filter: brightness(1);
      transform: translate(-50%, -50%) scale(1);

      transition:
        opacity .34s ease,
        transform .34s cubic-bezier(.2,.8,.25,1),
        filter .34s ease,
        visibility 0s linear 0s;
    }

    #confirm-button:active {
      transform: translate(-50%, calc(-50% + 1px)) scale(.98);
    }

    /*
      대화창과 조이스틱 영역
    */
    #ui-zone {
      position: relative;
      width: 100%;
      height: clamp(370px, 94vw, 540px);
      margin-top: 12px;
    }

    .frame-crop {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /*
      T0 질문 / 설명창
    */
    #t0-panel {
      position: absolute;
      top: 24px;
      left: 0;
      width: 100%;
      aspect-ratio: 4355 / 1774;
      overflow: hidden;
    }

    #t0-panel .frame-crop img {
      position: absolute;
      left: -3.88%;
      top: -11.44%;
      width: 108.29%;
      height: 121.98%;
      max-width: none;
      image-rendering: pixelated;
      user-select: none;
    }

    #t0-panel .content {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 24%;
      gap: 3%;
      padding: 6.6% 8% 13% 7%;
    }

    #t0-panel.is-message .content {
      grid-template-columns: 1fr;
      padding-right: 8%;
    }

    #t0-text {
      align-self: start;
      color: #fff;

      /* 여기에요 여기!!! T0 질문 / 설명 글자 크기 */
      font-size: clamp(20px, 5.1vw, 33px);

      line-height: 1.18;
      letter-spacing: .01em;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    #t0-choices {
      display: grid;
      align-content: start;
      gap: 18%;
      padding-top: 1%;
    }

    .t0-choice {
      width: max-content;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0;
      font-size: clamp(16px, 4.3vw, 27px);
      line-height: 1.1;
      text-align: left;
      cursor: pointer;
    }

    .t0-choice.active {
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255,255,255,.78);
    }

    /*
      T1 행동 선택창
      bottom 숫자가 커질수록 T1 창이 위로 올라갑니다.
    */
    #t1-panel {
      position: absolute;
      left: 0;

      /* T1 창을 위로 올리는 곳 */
      bottom: 78px;

      width: 64%;
      aspect-ratio: 2470 / 1271;
      overflow: hidden;
    }

    #t1-panel .frame-crop img {
      position: absolute;
      left: -7.17%;
      top: -14.71%;
      width: 115.71%;
      height: 129.9%;
      max-width: none;
      image-rendering: pixelated;
      user-select: none;
    }

    #t1-panel .content {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: start;

      /* 여기에요 여기!!! T1 선택지 줄 간격 */
      gap: 5.8%;

      padding: 6.5% 9% 15%;
    }

    .t1-action {
      width: max-content;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0;

      /* 여기에요 여기!!! T1 선택지 글자 크기 */
      font-size: clamp(13px, 3.75vw, 30px);

      line-height: 1.04;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .t1-action:active,
    .t1-action:focus-visible {
      outline: 0;
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255,255,255,.78);
    }

    /*
      조이스틱
      bottom 숫자가 커질수록 조이스틱이 위로 올라갑니다.
    */
    #joystick-base {
      position: absolute;
      right: 3%;

      /* 조이스틱을 위로 올리는 곳 */
      bottom: 78px;

      width: 30%;
      min-width: 108px;
      max-width: 156px;
      aspect-ratio: 1;
      border: 3px solid #fff;
      border-radius: 50%;
      background: #000;
      box-shadow:
        0 0 0 5px #000,
        0 0 0 7px rgba(255,255,255,.16),
        0 0 9px rgba(255,255,255,.2);
      touch-action: none;
    }

    #joystick-base::before,
    #joystick-base::after {
      position: absolute;
      content: "";
      border-radius: 50%;
      pointer-events: none;
    }

    #joystick-base::before {
      inset: 13%;
      border: 2px solid rgba(255,255,255,.85);
    }

    #joystick-base::after {
      inset: 28%;
      border: 2px solid rgba(255,255,255,.5);
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 35%;
      aspect-ratio: 1;
      border: 3px solid #fff;
      border-radius: 50%;
      background: #000;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 7px rgba(255,255,255,.3);
      pointer-events: none;
    }

    #cut-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      background: #000;
    }

    #cut-overlay.active {
      opacity: 1;
      animation: cut .22s steps(2,end) both;
    }

    @keyframes cut {
      30% {
        background: #fff;
      }

      100% {
        background: #000;
        opacity: 1;
      }
    }

    @media (min-width: 700px) {
      #app {
        width: min(92vw, 960px);
        padding: 36px 24px 40px;
      }

      .room-title {
        font-size: 36px;
      }

      #room-stage {
        margin-top: 112px;
      }

      #ui-zone {
        height: min(70vw, 690px);
      }

      #joystick-base {
        width: 29%;
        min-width: 146px;
      }
    }

    @media (max-width: 360px) {
      #app {
        padding-inline: 10px;
      }

      .room-title {
        font-size: 21px;
      }

      #room-stage {
        margin-top: 88px;
      }

      #ui-zone {
        height: 370px;
      }

      #t1-panel {
        bottom: 78px;
      }

      #joystick-base {
        bottom: 78px;
        width: 30%;
        min-width: 102px;
      }

      .t1-action {
        font-size: 13px;
      }

      #t0-text {
        font-size: 18px;
      }

      .t0-choice {
        font-size: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <h1 class="room-title">Room- 11101011</h1>

    <section id="room-stage" aria-label="미니 연구실">
      <img id="room-bg" src="./room-bg.png" alt="">
      <div id="stage-effects" aria-hidden="true"></div>
      <div id="player" aria-hidden="true"></div>
      <button id="confirm-button" class="typed-target" type="button" hidden></button>
    </section>

    <section id="ui-zone" aria-label="연구실 인터페이스">
      <section id="t0-panel" hidden aria-label="스크린 확인 질문">
        <div class="frame-crop">
          <img src="./T0.PNG" alt="">
        </div>

        <div class="content">
          <div id="t0-text" class="typed-target"></div>

          <div id="t0-choices">
            <button class="t0-choice typed-target" id="t0-yes" type="button"></button>
            <button class="t0-choice typed-target" id="t0-no" type="button"></button>
          </div>
        </div>
      </section>

      <section id="t1-panel" hidden aria-label="행동 선택">
        <div class="frame-crop">
          <img src="./T1.png" alt="">
        </div>

        <div class="content">
          <button class="t1-action typed-target" data-action="inspect" type="button"></button>
          <button class="t1-action typed-target" data-action="drop" type="button"></button>
          <button class="t1-action typed-target" data-action="peek" type="button"></button>
          <button class="t1-action typed-target" data-action="quit" type="button"></button>
        </div>
      </section>

      <div id="joystick-base" aria-label="이동 조이스틱">
        <div id="joystick-knob"></div>
      </div>
    </section>
  </main>

  <div id="cut-overlay" aria-hidden="true"></div>

  <script>
    const NO_ROOM_URL = "no-room.html";

    const COPY = {
      confirm: "확인",
      question: "스크린을 확인하시겠습니까?",
      yes: "• 네",
      no: "• 아니오",
      actions: [
        "1. 조사한다",
        "2. 바닥으로 버린다.",
        "3. 안을 자세히 들여다 본다.",
        "4. 관둔다"
      ]
    };

    const OBJECTS = [
      {
        id: "screen01",
        x: 16,
        y: 55,
        buttonX: 16,
        buttonY: 13,
        coverX: 10,
        coverY: 28,
        coverW: 12,
        coverH: 25,
        description:
          "스크린에는 오래된 관측 로그가 남아 있다.\n같은 좌표를 반복해서 가리키는 흔적만 남아 있다."
      },
      {
        id: "screen02",
        x: 50,
        y: 55,
        buttonX: 50,
        buttonY: 13,
        coverX: 44,
        coverY: 28,
        coverW: 12,
        coverH: 25,
        description:
          "화면 안쪽에는 흐릿한 도면이 열려 있다.\n출입문이 아니라, 안쪽으로 향하는 틈처럼 보인다."
      },
      {
        id: "screen03",
        x: 84,
        y: 55,
        buttonX: 84,
        buttonY: 13,
        coverX: 78,
        coverY: 28,
        coverW: 12,
        coverH: 25,
        description:
          "스크린 표면은 멀쩡해 보인다.\n하지만 안쪽에서 미세한 떨림이 계속 느껴진다."
      }
    ];

    const $ = (selector) => document.querySelector(selector);

    const player = $("#player");
    const confirmButton = $("#confirm-button");
    const stageEffects = $("#stage-effects");

    const t0Panel = $("#t0-panel");
    const t1Panel = $("#t1-panel");
    const t0Text = $("#t0-text");
    const t0Choices = $("#t0-choices");
    const t0Yes = $("#t0-yes");
    const t0No = $("#t0-no");

    const joystickBase = $("#joystick-base");
    const joystickKnob = $("#joystick-knob");
    const cutOverlay = $("#cut-overlay");

    const actionButtons = [
      ...document.querySelectorAll(".t1-action")
    ];

    const state = {
      mode: "free",
      playerX: 50,
      playerY: 76,
      activeId: null,
      confirmId: null,
      selectedQuestion: "yes",
      removed: new Set(),
      textScene: 0
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const joystick = {
      active: false,
      x: 0,
      y: 0
    };

    const clamp = (value, min, max) =>
      Math.max(min, Math.min(max, value));

    const byId = (id) =>
      OBJECTS.find((item) => item.id === id) || null;

    const distance = (a, b, c, d) =>
      Math.hypot(a - c, b - d);

    function stopTyping(element) {
      element._typingToken = (element._typingToken || 0) + 1;

      if (element._typingTimer) {
        clearTimeout(element._typingTimer);
      }
    }

    function screenReact(element) {
      const host = element.closest(
        "#t0-panel, #t1-panel, #confirm-button"
      );

      if (!host) {
        return;
      }

      host.classList.remove("screen-react");

      void host.offsetWidth;

      host.classList.add("screen-react");

      window.setTimeout(() => {
        host.classList.remove("screen-react");
      }, 130);
    }

    function typeText(element, text, options = {}) {
      stopTyping(element);

      const token = element._typingToken;
      const speed = options.speed ?? 58;
      const startDelay = options.startDelay ?? 0;
      const chars = Array.from(text);

      element.textContent = "";
      element.setAttribute("aria-label", text.replace(/\n/g, " "));

      let index = 0;

      function next() {
        if (element._typingToken !== token) {
          return;
        }

        if (index >= chars.length) {
          if (typeof options.onComplete === "function") {
            options.onComplete();
          }

          return;
        }

        const character = chars[index];

        if (character === "\n") {
          element.append(document.createElement("br"));
        } else {
          const span = document.createElement("span");

          span.className = "typed-char";

          const roll = Math.random();

          if (roll > .88) {
            span.classList.add("glitch");
          } else if (roll > .78) {
            span.classList.add("glow");
          }

          span.textContent = character === " " ? "\u00A0" : character;

          element.append(span);
        }

        screenReact(element);

        index += 1;

        let delay =
          speed +
          Math.round((Math.random() - .5) * 34);

        if (/[.,?!]/.test(character)) {
          delay += 80;
        }

        if (character === " ") {
          delay -= 10;
        }

        element._typingTimer = window.setTimeout(
          next,
          Math.max(34, delay)
        );
      }

      element._typingTimer =
        window.setTimeout(next, startDelay);
    }

    function stopPanelTyping() {
      state.textScene += 1;

      stopTyping(t0Text);
      stopTyping(t0Yes);
      stopTyping(t0No);

      actionButtons.forEach((button) => {
        stopTyping(button);
      });
    }

    function typeQuestion() {
      const scene = ++state.textScene;

      stopTyping(t0Text);
      stopTyping(t0Yes);
      stopTyping(t0No);

      t0Yes.disabled = true;
      t0No.disabled = true;

      typeText(t0Text, COPY.question, {
        speed: 62,
        onComplete: () => {
          if (scene !== state.textScene) {
            return;
          }

          typeText(t0Yes, COPY.yes, {
            speed: 68,
            onComplete: () => {
              if (scene === state.textScene) {
                t0Yes.disabled = false;
              }
            }
          });

          window.setTimeout(() => {
            if (scene !== state.textScene) {
              return;
            }

            typeText(t0No, COPY.no, {
              speed: 68,
              onComplete: () => {
                if (scene === state.textScene) {
                  t0No.disabled = false;
                }
              }
            });
          }, 120);
        }
      });
    }

    function typeActions() {
      const scene = ++state.textScene;
      let delay = 0;

      actionButtons.forEach((button, index) => {
        button.disabled = true;

        const label = COPY.actions[index];

        typeText(button, label, {
          speed: 50,
          startDelay: delay,
          onComplete: () => {
            if (scene === state.textScene) {
              button.disabled = false;
            }
          }
        });

        delay += label.length * 50 + 90;
      });
    }

    function updatePlayer() {
      player.style.left = `${state.playerX}%`;
      player.style.top = `${state.playerY}%`;
    }

    function nearestObject() {
      let nearest = null;
      let shortest = Infinity;

      for (const item of OBJECTS) {
        if (state.removed.has(item.id)) {
          continue;
        }

        const current = distance(
          state.playerX,
          state.playerY,
          item.x,
          item.y
        );

        if (current < shortest) {
          shortest = current;
          nearest = item;
        }
      }

      return shortest <= 13 ? nearest : null;
    }

    function updateQuestionSelection() {
      t0Yes.classList.toggle(
        "active",
        state.selectedQuestion === "yes"
      );

      t0No.classList.toggle(
        "active",
        state.selectedQuestion === "no"
      );
    }

    function renderRemoved() {
      stageEffects.innerHTML = "";

      for (const item of OBJECTS) {
        if (!state.removed.has(item.id)) {
          continue;
        }

        const cover = document.createElement("div");

        cover.className = "removed-cover";
        cover.style.left = `${item.coverX}%`;
        cover.style.top = `${item.coverY}%`;
        cover.style.width = `${item.coverW}%`;
        cover.style.height = `${item.coverH}%`;

        stageEffects.append(cover);
      }
    }

    function showConfirm(item) {
      confirmButton.style.left = `${item.buttonX}%`;
      confirmButton.style.top = `${item.buttonY}%`;

      const isNew =
        confirmButton.hidden ||
        state.confirmId !== item.id;

      state.confirmId = item.id;

      if (confirmButton.hidden) {
        confirmButton.hidden = false;
      }

      requestAnimationFrame(() => {
        confirmButton.classList.add("visible");
      });

      if (isNew) {
        typeText(confirmButton, COPY.confirm, {
          speed: 72
        });
      }
    }

    function hideConfirm(immediate = false) {
      if (confirmButton.hidden) {
        return;
      }

      state.confirmId = null;
      confirmButton.classList.remove("visible");

      if (immediate) {
        confirmButton.hidden = true;
        stopTyping(confirmButton);
        return;
      }

      const hideToken =
        (confirmButton._hideToken || 0) + 1;

      confirmButton._hideToken = hideToken;

      window.setTimeout(() => {
        if (
          confirmButton._hideToken === hideToken &&
          !confirmButton.classList.contains("visible")
        ) {
          confirmButton.hidden = true;
          stopTyping(confirmButton);
        }
      }, 360);
    }

    function updateConfirm() {
      const item =
        state.mode === "free"
          ? nearestObject()
          : null;

      if (!item) {
        hideConfirm();
        return;
      }

      showConfirm(item);
    }

    function closeAllPanels() {
      state.mode = "free";
      state.activeId = null;

      stopPanelTyping();

      t0Panel.hidden = true;
      t1Panel.hidden = true;
      t0Panel.classList.remove("is-message");

      t0Choices.hidden = false;
      t0Text.textContent = "";
      t0Yes.textContent = "";
      t0No.textContent = "";

      updateConfirm();
    }

    function openT0Question(item) {
      state.mode = "question";
      state.activeId = item.id;
      state.selectedQuestion = "yes";

      hideConfirm(true);

      t0Panel.classList.remove("is-message");
      t0Choices.hidden = false;

      t0Panel.hidden = false;
      t1Panel.hidden = true;

      updateQuestionSelection();
      typeQuestion();
    }

    function openT1Actions() {
      if (!state.activeId) {
        return;
      }

      state.mode = "actions";

      t0Choices.hidden = true;
      stopTyping(t0Yes);
      stopTyping(t0No);

      t0Panel.hidden = false;
      t1Panel.hidden = false;

      typeActions();
    }

    function showMessage(text) {
      state.mode = "message";

      state.textScene += 1;

      stopTyping(t0Text);
      stopTyping(t0Yes);
      stopTyping(t0No);

      t0Panel.classList.add("is-message");
      t0Choices.hidden = true;
      t0Panel.hidden = false;
      t1Panel.hidden = false;

      typeText(t0Text, text, {
        speed: 56
      });
    }

    function answerQuestion(answer) {
      if (state.mode !== "question") {
        return;
      }

      t0Choices.hidden = true;
      stopTyping(t0Yes);
      stopTyping(t0No);

      if (answer === "yes") {
        openT1Actions();
      } else {
        closeAllPanels();
      }
    }

    function runT1Action(action) {
      if (state.mode !== "actions") {
        return;
      }

      const item = byId(state.activeId);

      if (!item) {
        closeAllPanels();
        return;
      }

      if (action === "inspect") {
        showMessage(item.description);
        return;
      }

      if (action === "drop") {
        state.removed.add(item.id);
        renderRemoved();
        showMessage("스크린을 바닥으로 버렸다.");
        return;
      }

      if (action === "peek") {
        state.mode = "cut";
        cutOverlay.classList.add("active");

        window.setTimeout(() => {
          window.location.href = NO_ROOM_URL;
        }, 220);

        return;
      }

      if (action === "quit") {
        closeAllPanels();
      }
    }

    function moveVector() {
      if (joystick.active) {
        return {
          x: joystick.x,
          y: joystick.y
        };
      }

      const x =
        (keys.right ? 1 : 0) -
        (keys.left ? 1 : 0);

      const y =
        (keys.down ? 1 : 0) -
        (keys.up ? 1 : 0);

      const length = Math.hypot(x, y) || 1;

      return {
        x: x / length,
        y: y / length
      };
    }

    function setJoystick(clientX, clientY) {
      const rect = joystickBase.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const maxRadius = rect.width * .28;

      const dx = clientX - centerX;
      const dy = clientY - centerY;

      const length = Math.hypot(dx, dy) || 1;
      const limited = Math.min(length, maxRadius);

      joystick.x =
        (dx / length) *
        (limited / maxRadius);

      joystick.y =
        (dy / length) *
        (limited / maxRadius);

      const knobX = joystick.x * rect.width * .22;
      const knobY = joystick.y * rect.width * .22;

      joystickKnob.style.transform =
        `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.x = 0;
      joystick.y = 0;

      joystickKnob.style.transform =
        "translate(-50%, -50%)";
    }

    confirmButton.addEventListener("click", () => {
      const item = nearestObject();

      if (item) {
        openT0Question(item);
      }
    });

    t0Yes.addEventListener("click", () => {
      answerQuestion("yes");
    });

    t0No.addEventListener("click", () => {
      answerQuestion("no");
    });

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        runT1Action(button.dataset.action);
      });
    });

    joystickBase.addEventListener("pointerdown", (event) => {
      joystick.active = true;
      joystickBase.setPointerCapture(event.pointerId);
      setJoystick(event.clientX, event.clientY);
    });

    joystickBase.addEventListener("pointermove", (event) => {
      if (joystick.active) {
        setJoystick(event.clientX, event.clientY);
      }
    });

    joystickBase.addEventListener("pointerup", resetJoystick);
    joystickBase.addEventListener("pointercancel", resetJoystick);

    document.addEventListener("pointerdown", () => {
      if (state.mode === "message") {
        closeAllPanels();
      }
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      const controlled = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "e",
        "enter",
        " ",
        "1",
        "2",
        "3",
        "4",
        "escape"
      ];

      if (controlled.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        keys.up = true;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = true;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = true;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = true;
      }

      if (state.mode === "free") {
        if (key === "e" || key === "enter") {
          const item = nearestObject();

          if (item) {
            openT0Question(item);
          }
        }

        return;
      }

      if (state.mode === "question") {
        if (key === "arrowup" || key === "arrowleft") {
          state.selectedQuestion = "yes";
          updateQuestionSelection();
        }

        if (key === "arrowdown" || key === "arrowright") {
          state.selectedQuestion = "no";
          updateQuestionSelection();
        }

        if (key === "enter" || key === " ") {
          answerQuestion(state.selectedQuestion);
        }

        return;
      }

      if (state.mode === "actions") {
        if (key === "1") {
          runT1Action("inspect");
        }

        if (key === "2") {
          runT1Action("drop");
        }

        if (key === "3") {
          runT1Action("peek");
        }

        if (key === "4" || key === "escape") {
          runT1Action("quit");
        }
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") {
        keys.up = false;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = false;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = false;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = false;
      }
    });

    let lastTime = performance.now();

    function loop(now) {
      const delta = Math.min(
        (now - lastTime) / 1000,
        .05
      );

      lastTime = now;

      if (state.mode === "free") {
        const vector = moveVector();

        const moving =
          vector.x !== 0 ||
          vector.y !== 0;

        player.classList.toggle("walking", moving);

        if (moving) {
          state.playerX = clamp(
            state.playerX + vector.x * 42 * delta,
            7,
            93
          );

          state.playerY = clamp(
            state.playerY + vector.y * 42 * delta,
            46,
            88
          );

          updatePlayer();
        }

        updateConfirm();
      } else {
        player.classList.remove("walking");
      }

      requestAnimationFrame(loop);
    }

    updatePlayer();
    renderRemoved();
    closeAllPanels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
