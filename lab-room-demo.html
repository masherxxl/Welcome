<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Room - 11101011</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff") format("woff");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "DeterminationK2", monospace;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 30px 14px 46px;
    }

    .room-title {
      margin: 16px 0 0;
      color: #9c9ca8;
      font-size: clamp(20px, 5.8vw, 34px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: .035em;
    }

    .typed-target {
      position: relative;
    }

    .typed-char {
      display: inline-block;
      min-width: .08em;
      opacity: 0;
      transform: translate(0, 0);
      animation: type-pop .035s steps(1, end) forwards;
    }

    .typed-char.glitch {
      animation:
        type-pop .035s steps(1, end) forwards,
        tiny-jitter .18s steps(2, end) .04s 1;
    }

    .typed-char.glow {
      animation:
        type-pop .035s steps(1, end) forwards,
        tiny-glow .28s steps(2, end) .04s 1;
    }

    .typed-char.afterimage {
      position: relative;
    }

    .typed-char.afterimage::after {
      position: absolute;
      top: 1px;
      left: -2px;
      z-index: -1;
      content: attr(data-echo);
      color: #b8b8c8;
      opacity: 0;
      filter: blur(.45px);
      pointer-events: none;
      animation: soft-afterimage .74s ease-out .03s both;
    }

    @keyframes type-pop {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes tiny-jitter {
      0%,
      100% {
        transform: translate(0, 0);
        filter: brightness(1);
      }

      35% {
        transform: translate(-1px, 0);
        filter: brightness(1.25);
      }

      70% {
        transform: translate(1px, -1px);
        filter: brightness(1);
      }
    }

    @keyframes tiny-glow {
      0%,
      100% {
        text-shadow: none;
        filter: brightness(1);
      }

      45% {
        text-shadow: 0 0 4px rgba(255,255,255,.75);
        filter: brightness(1.55);
      }
    }

    @keyframes soft-afterimage {
      0% {
        opacity: .48;
        transform: translate(0, 0);
      }

      100% {
        opacity: 0;
        transform: translate(7px, -1px);
      }
    }

    .screen-react {
      animation: screen-react .12s steps(2, end) both;
    }

    @keyframes screen-react {
      0% {
        filter: brightness(1);
        transform: translate(0, 0);
      }

      45% {
        filter: brightness(1.18);
        transform: translate(1px, 0);
      }

      100% {
        filter: brightness(1);
        transform: translate(0, 0);
      }
    }

    #room-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1.52 / 1;
      margin-top: clamp(94px, 23vw, 120px);
      overflow: hidden;
      background: #000;
    }

    #room-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 49%;
      transform: scale(1.17);
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
    }

    #stage-effects {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .screen-cover {
      position: absolute;
      background: #020203;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
    }

    .fallen-screen {
      position: absolute;
      z-index: 2;
      width: 17%;
      aspect-ratio: 2.35 / 1;
      border: 2px solid #d9d9e6;
      background:
        linear-gradient(
          90deg,
          transparent 12%,
          rgba(255,255,255,.5) 12% 14%,
          transparent 14% 86%,
          rgba(255,255,255,.3) 86% 88%,
          transparent 88%
        ),
        #11121b;
      box-shadow:
        inset 0 0 0 2px #000,
        0 0 7px rgba(255,255,255,.16);
      transform: translate(-50%, -50%) rotate(var(--tilt));
    }

    .fallen-screen::before {
      position: absolute;
      inset: 17% 13%;
      content: "";
      border: 1px solid rgba(255,255,255,.58);
      background:
        linear-gradient(
          135deg,
          transparent 46%,
          rgba(255,255,255,.35) 47% 49%,
          transparent 50%
        );
    }

    .fallen-screen::after {
      position: absolute;
      top: 100%;
      left: 64%;
      width: 18%;
      height: 32%;
      content: "";
      border-left: 2px solid rgba(255,255,255,.55);
      transform: rotate(24deg);
      transform-origin: top;
    }

    .void-screen {
      position: absolute;
      z-index: 2;
      border: 2px solid rgba(255,255,255,.56);
      background:
        radial-gradient(
          ellipse at 50% 50%,
          #000 0 48%,
          #090912 54%,
          #000 71%
        );
      box-shadow:
        inset 0 0 13px #000,
        0 0 8px rgba(255,255,255,.12);
    }

    .void-screen::before,
    .void-screen::after {
      position: absolute;
      content: "";
      background: rgba(255,255,255,.42);
    }

    .void-screen::before {
      top: 13%;
      left: 15%;
      width: 2px;
      height: 72%;
      transform: rotate(26deg);
    }

    .void-screen::after {
      top: 53%;
      left: 7%;
      width: 84%;
      height: 2px;
      transform: rotate(-14deg);
    }

    #player {
      position: absolute;
      left: 50%;
      top: 76%;
      z-index: 3;
      width: 5.5%;
      aspect-ratio: 14 / 22;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 2px rgba(255,255,255,.6));
      pointer-events: none;
    }

    #player::before {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid #0b0c14;
      background: linear-gradient(
        to bottom,
        #fff 0 27%,
        #d9def8 27% 58%,
        #8a94c0 58% 100%
      );
      clip-path: polygon(
        35% 0%, 65% 0%, 74% 10%, 74% 28%, 88% 42%, 82% 57%,
        69% 57%, 69% 100%, 56% 100%, 56% 73%, 44% 73%, 44% 100%,
        31% 100%, 31% 57%, 18% 57%, 12% 42%, 26% 28%, 26% 10%
      );
    }

    #player::after {
      position: absolute;
      left: 40%;
      top: 18%;
      width: 20%;
      height: 9%;
      content: "";
      background: #05050a;
    }

    #player.walking {
      animation: player-bob .15s steps(2, end) infinite;
    }

    @keyframes player-bob {
      50% {
        transform: translate(-50%, calc(-50% + 1px));
      }
    }

    #confirm-button {
      position: absolute;
      z-index: 6;
      min-width: 82px;
      padding: 10px 17px 9px;
      border: 3px solid #fff;
      background: #000;
      color: #fff;
      font-size: clamp(15px, 4vw, 23px);
      line-height: 1;
      letter-spacing: .04em;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, calc(-50% + 10px)) scale(.92);
      box-shadow:
        0 0 0 3px #000,
        0 0 10px rgba(255,255,255,.3);
      transition:
        opacity .34s ease,
        transform .34s cubic-bezier(.2, .8, .25, 1),
        visibility 0s linear .34s;
      cursor: pointer;
      will-change: opacity, transform;
    }

    #confirm-button.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
      transition:
        opacity .34s ease,
        transform .34s cubic-bezier(.2, .8, .25, 1),
        visibility 0s linear 0s;
    }

    #confirm-button:active {
      transform: translate(-50%, calc(-50% + 1px)) scale(.98);
    }

    #ui-zone {
      position: relative;
      width: 100%;
      height: clamp(370px, 94vw, 540px);
      margin-top: 12px;
    }

    .frame-crop {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    #t0-panel {
      position: absolute;
      top: 24px;
      left: 0;
      width: 100%;
      aspect-ratio: 4355 / 1774;
      overflow: hidden;
    }

    #t0-panel .frame-crop img {
      position: absolute;
      left: -3.88%;
      top: -11.44%;
      width: 108.29%;
      height: 121.98%;
      max-width: none;
      image-rendering: pixelated;
      user-select: none;
    }

    #t0-panel .content {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 24%;
      gap: 3%;
      padding: 6.6% 8% 13% 7%;
    }

    #t0-panel.is-message .content {
      grid-template-columns: 1fr;
      padding-right: 8%;
    }

    #t0-text {
      align-self: start;
      color: #fff;
      font-size: clamp(20px, 5.1vw, 33px);
      line-height: 1.18;
      letter-spacing: .01em;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    #t0-choices {
      display: grid;
      align-content: start;
      gap: 18%;
      padding-top: 1%;
    }

    .t0-choice {
      width: max-content;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0;
      font-size: clamp(16px, 4.3vw, 27px);
      line-height: 1.1;
      text-align: left;
      cursor: pointer;
    }

    .t0-choice.active {
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255,255,255,.78);
    }

    #t1-panel {
      position: absolute;
      left: 0;
      bottom: 78px;
      width: 64%;
      aspect-ratio: 2470 / 1271;
      overflow: hidden;
    }

    #t1-panel.is-locked {
      pointer-events: none;
    }

    #t1-panel .frame-crop img {
      position: absolute;
      left: -7.17%;
      top: -14.71%;
      width: 115.71%;
      height: 129.9%;
      max-width: none;
      image-rendering: pixelated;
      user-select: none;
    }

    #t1-panel .content {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: start;
      gap: 5.8%;
      padding: 6.5% 9% 15%;
    }

    .t1-action {
      width: max-content;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0;

      /* T1 선택지 글자 크기 */
      font-size: clamp(14px, 3.95vw, 32px);

      line-height: 1.04;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .t1-action.is-long {
      font-size: clamp(12px, 3.35vw, 28px);
    }

    .t1-action:active,
    .t1-action:focus-visible {
      outline: 0;
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255,255,255,.78);
    }

    #joystick-base {
      position: absolute;
      right: 3%;
      bottom: 78px;
      width: 30%;
      min-width: 108px;
      max-width: 156px;
      aspect-ratio: 1;
      border: 3px solid #fff;
      border-radius: 50%;
      background: #000;
      box-shadow:
        0 0 0 5px #000,
        0 0 0 7px rgba(255,255,255,.16),
        0 0 9px rgba(255,255,255,.2);
      touch-action: none;
    }

    #joystick-base::before,
    #joystick-base::after {
      position: absolute;
      content: "";
      border-radius: 50%;
      pointer-events: none;
    }

    #joystick-base::before {
      inset: 13%;
      border: 2px solid rgba(255,255,255,.85);
    }

    #joystick-base::after {
      inset: 28%;
      border: 2px solid rgba(255,255,255,.5);
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 35%;
      aspect-ratio: 1;
      border: 3px solid #fff;
      border-radius: 50%;
      background: #000;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 7px rgba(255,255,255,.3);
      pointer-events: none;
    }

    #cut-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      background: #000;
    }

    #cut-overlay.active {
      opacity: 1;
      pointer-events: auto;
      animation: cut .22s steps(2, end) both;
    }

    #cut-overlay.binary-return {
      animation: binary-return .56s steps(3, end) both;
    }

    @keyframes cut {
      30% {
        background: #fff;
      }

      100% {
        background: #000;
        opacity: 1;
      }
    }

    @keyframes binary-return {
      0% {
        opacity: 0;
        background: #000;
      }

      20% {
        opacity: 1;
        background:
          linear-gradient(
            0deg,
            #fff 0 9%,
            #000 9% 18%,
            #fff 18% 21%,
            #000 21% 100%
          );
      }

      48% {
        background:
          linear-gradient(
            0deg,
            #000 0 42%,
            #fff 42% 46%,
            #000 46% 74%,
            #fff 74% 78%,
            #000 78% 100%
          );
      }

      100% {
        opacity: 1;
        background: #000;
      }
    }

    @media (min-width: 700px) {
      #app {
        width: min(92vw, 960px);
        padding: 36px 24px 40px;
      }

      .room-title {
        font-size: 36px;
      }

      #room-stage {
        margin-top: 112px;
      }

      #ui-zone {
        height: min(70vw, 690px);
      }

      #joystick-base {
        width: 29%;
        min-width: 146px;
      }
    }

    @media (max-width: 360px) {
      #app {
        padding-inline: 10px;
      }

      .room-title {
        font-size: 21px;
      }

      #room-stage {
        margin-top: 88px;
      }

      #ui-zone {
        height: 370px;
      }

      .t1-action {
        font-size: 13px;
      }

      .t1-action.is-long {
        font-size: 12px;
      }

      #t0-text {
        font-size: 18px;
      }

      .t0-choice {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <h1 class="room-title">Room- 11101011</h1>

    <section id="room-stage" aria-label="미니 연구실">
      <img id="room-bg" src="./room-bg.png" alt="">
      <div id="stage-effects" aria-hidden="true"></div>
      <div id="player" aria-hidden="true"></div>
      <button id="confirm-button" class="typed-target" type="button" hidden></button>
    </section>

    <section id="ui-zone" aria-label="연구실 인터페이스">
      <section id="t0-panel" hidden aria-label="스크린 확인 질문">
        <div class="frame-crop">
          <img src="./T0.PNG" alt="">
        </div>

        <div class="content">
          <div id="t0-text" class="typed-target"></div>

          <div id="t0-choices">
            <button class="t0-choice typed-target" id="t0-yes" type="button"></button>
            <button class="t0-choice typed-target" id="t0-no" type="button"></button>
          </div>
        </div>
      </section>

      <section id="t1-panel" hidden aria-label="행동 선택">
        <div class="frame-crop">
          <img src="./T1.png" alt="">
        </div>

        <div class="content">
          <button class="t1-action typed-target" type="button"></button>
          <button class="t1-action typed-target" type="button"></button>
          <button class="t1-action typed-target" type="button"></button>
          <button class="t1-action typed-target" type="button"></button>
        </div>
      </section>

      <div id="joystick-base" aria-label="이동 조이스틱">
        <div id="joystick-knob"></div>
      </div>
    </section>
  </main>

  <div id="cut-overlay" aria-hidden="true"></div>

  <script>
    const BINARY_RETURN_URL = "index.html?return=binary";
    const CONFIRM_FADE_MS = 360;

    const S = (text, options = {}) => ({
      text,
      ...options
    });

    const P = (...segments) => ({
      segments
    });

    const STORIES = {
      screen01: {

          P(

            S("같은 좌표를 반복해서 가리키는 흔적만 남아 있다.")
          )
        ],

        actions: [
          {
            id: "knock",
            label: "1. 스크린을 두드린다.",
            pages: [
              P(
                S("스크린에게 노크를 했다.\n"),

              )

          {

                }),
                S("스크린은 시무룩해졌다.", {
                  pauseBefore: 180
                })
              )
            ]
          },
          {
            id: "break",
            label: "3. 부셔본다.",

            pages: [
              P(
                S("스크린을 있는 힘껏 주먹으로 내리쳤다.\n"),
                S("...", {
                  speed: 240,
                  pauseAfter: 220
                }),
                S("부셔졌다. 더 이상 스크린의 형체가 아니다.", {
                  speed: 52
                })
              )
            ]
          },
          {
            id: "return",
            label: "4. 돌아간다.",
            returnOnly: true
          }
        ]
      },

      screen02: {
        opening: [
          P(
            S("화면 안쪽에는 흐릿한 도면이 열려 있다.\n"),

        actions: [
          {
            id: "stare",
            label: "1. 스크린을 계속 바라본다.",
            pages: [
              P(
                S("스크린을 계속 유심히 바라봤다.\n"),
                S("누군가가 망치질 한 흔적이 보인다.\n"),
                S("...", {
                  speed: 120,
                  pauseAfter: 110
                }),
                S("보아하니, ", {
                  pauseAfter: 120
                }),
                S("가상의 물질로 만들어진 듯 하다.")
              ),
              P(
                S("...", {
                  speed: 120,
                  pauseAfter: 130
                }),
                S("어딘가 정성스러운 손길의 냄새가 느껴진다.")
              )
            ]
          },
          {
            id: "pet",
            label: "2. 쓰다듬는다.",
            pages: [
              P(
                S("스크린을 천천히 쓰다듬었다.\n"),
                S("내부에서 돌아가던 모터 소리가 눈에 띄게 활발해졌다.\n", {
                  pauseBefore: 110
                }),
                S("고양이처럼 기분 좋게 가르랑거리는 듯했다.", {

              P(
                S("띠로링, 하는 맑은 알림음이 연달아 울렸다.\n"),

          {

            pages: [
              P(

                S("글자가 한 글자씩, 버티듯 이어지다 가동이 멎었다.\n", {
                  speed: 78

                S("띠링—...", {
                  speed: 88,
                  pauseAfter: 140
                }),
                S("\n알림음과 함께, 완전히 멈췄다.\n", {
                  pauseBefore: 100

                S("...", {
                  speed: 240,
                  pauseAfter: 150
                }),
                S("더 이상 스크린의 형체 조차 남아 있지 않았다.")

          },
          {
            id: "return",
            label: "4. 돌아간다.",
            returnOnly: true
          }
        ]
      },

      screen03: {
        opening: [
          P(
            S("스크린 표면은 멀쩡해 보인다.\n"),
            S("하지만 안쪽에서 미세한 떨림이 계속 느껴진다.")
          )
        ],

        actions: [
          {
            id: "inspect",
            label: "1. 스크린을 조사한다.",
            pages: [
              P(
                S("낡고 이끼가 끼어있는 가상의 스크린이다.\n"),
                S("만져보려 손을 뻗었지만, 허공만 만져진다.\n", {
                  pauseBefore: 100
                }),
                S("두께는 30mm로, 재질은 공기보다 얇다", {
                  pauseBefore: 100
                })
              ),
              P(
                S("...", {
                  speed: 140,
                  pauseAfter: 120
                }),
                S("화면이 희미하게 떨리고 있다.")
              )
            ]
          },
          {
            id: "message",
            label: "2. 다음 화면으로 넘겨본다.",
            pages: [
              P(
                S("스크린에서 숨겨진 문장이 나왔다.\n\n"),
                S("힘들고, 역경이 몰아쳐도...\n", {
                  afterimage: true,
                  pauseBefore: 120
                }),
                S("당신은 계속 나아갈 수 있습니다.\n", {
                  afterimage: true,
                  pauseBefore: 100
                }),
                S("심해와, 이곳에 남겨진 우리들은\n", {
                  afterimage: true,
                  pauseBefore: 100
                }),
                S("당신을 기다리고 있습니다.", {
                  afterimage: true,
                  pauseBefore: 100
                })
              ),
              P(
                S("따뜻한 의자에 앉아\n", {
                  afterimage: true
                }),
                S("아무 걱정 없이 쉬어 갈 그날을 위해.", {
                  afterimage: true,
                  pauseBefore: 100
                })
              ),
              P(
                S("......", {
                  speed: 190,
                  pauseAfter: 160
                }),
                S("글자가, 그곳에서 끊겼다.")
              )
            ]
          },
          {
            id: "break",
            label: "3. 부셔본다.",
            destroy: "void",
            pages: [
              P(
                S("스크린을 있는 힘껏 주먹으로 내리쳤다.\n"),
                S("...", {
                  speed: 240,
                  pauseAfter: 180
                }),
                S("스크린이 산산조각 났다.\n"),
                S("검은 공간이 드러났다.", {
                  pauseBefore: 120
                })
              )
            ]
          },
          {
            id: "inside",
            label: "4. 스크린의 안쪽을 들여다본다.",
            returnBinary: true
          }
        ]
      }
    };

    const OBJECTS = [
      {
        id: "screen01",
        x: 16,
        y: 55,
        buttonX: 16,
        buttonY: 13,
        coverX: 10,
        coverY: 28,
        coverW: 12,
        coverH: 25,
        fallenX: 17,
        fallenY: 70,
        fallenTilt: "-9deg"
      },
      {
        id: "screen02",
        x: 50,
        y: 55,
        buttonX: 50,
        buttonY: 13,
        coverX: 44,
        coverY: 28,
        coverW: 12,
        coverH: 25,
        fallenX: 50,
        fallenY: 70,
        fallenTilt: "6deg"
      },
      {
        id: "screen03",
        x: 84,
        y: 55,
        buttonX: 84,
        buttonY: 13,
        coverX: 78,
        coverY: 28,
        coverW: 12,
        coverH: 25,
        fallenX: 83,
        fallenY: 70,
        fallenTilt: "-4deg"
      }
    ];

    const $ = (selector) => document.querySelector(selector);

    const player = $("#player");
    const confirmButton = $("#confirm-button");
    const stageEffects = $("#stage-effects");

    const t0Panel = $("#t0-panel");
    const t1Panel = $("#t1-panel");
    const t0Text = $("#t0-text");
    const t0Choices = $("#t0-choices");
    const t0Yes = $("#t0-yes");
    const t0No = $("#t0-no");

    const joystickBase = $("#joystick-base");
    const joystickKnob = $("#joystick-knob");
    const cutOverlay = $("#cut-overlay");

    const actionButtons = [
      ...document.querySelectorAll(".t1-action")
    ];

    const state = {
      mode: "free",
      playerX: 50,
      playerY: 76,
      activeId: null,
      confirmId: null,
      selectedQuestion: "yes",
      destroyed: new Map(),
      reading: null,
      textScene: 0
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const joystick = {
      active: false,
      x: 0,
      y: 0
    };

    let confirmHideTimer = null;

    const clamp = (value, min, max) =>
      Math.max(min, Math.min(max, value));

    const byId = (id) =>
      OBJECTS.find((item) => item.id === id) || null;

    const distance = (a, b, c, d) =>
      Math.hypot(a - c, b - d);

    function stopTyping(element) {
      element._typingToken = (element._typingToken || 0) + 1;

      if (element._typingTimer) {
        clearTimeout(element._typingTimer);
      }
    }

    function screenReact(element) {
      const host = element.closest("#t0-panel, #t1-panel");

      if (!host) {
        return;
      }

      host.classList.remove("screen-react");

      void host.offsetWidth;

      host.classList.add("screen-react");

      window.setTimeout(() => {
        host.classList.remove("screen-react");
      }, 130);
    }

    function typePage(element, page, options = {}) {
      stopTyping(element);

      const token = element._typingToken;
      const segments =
        typeof page === "string"
          ? [S(page)]
          : page.segments;

      const baseSpeed = options.speed ?? 58;

      element.textContent = "";
      element.setAttribute(
        "aria-label",
        segments
          .map((segment) => segment.text)
          .join("")
          .replace(/\n/g, " ")
      );

      let segmentIndex = 0;
      let charIndex = 0;
      let segmentStarted = false;

      function continueTyping() {
        if (element._typingToken !== token) {
          return;
        }

        if (segmentIndex >= segments.length) {
          options.onComplete?.();
          return;
        }

        const segment = segments[segmentIndex];

        if (charIndex === 0 && !segmentStarted) {
          segmentStarted = true;

          if (segment.pauseBefore) {
            element._typingTimer = window.setTimeout(
              continueTyping,
              segment.pauseBefore
            );
            return;
          }
        }

        if (charIndex >= segment.text.length) {
          segmentIndex += 1;
          charIndex = 0;
          segmentStarted = false;

          element._typingTimer = window.setTimeout(
            continueTyping,
            segment.pauseAfter || 0
          );
          return;
        }

        const character = segment.text[charIndex];

        if (character === "\n") {
          element.append(document.createElement("br"));
        } else {
          const span = document.createElement("span");

          span.className = "typed-char";

          const roll = Math.random();

          if (roll > .9) {
            span.classList.add("glitch");
          } else if (roll > .81) {
            span.classList.add("glow");
          }

          if (segment.afterimage) {
            span.classList.add("afterimage");
            span.dataset.echo =
              character === " " ? "" : character;
          }

          span.textContent =
            character === " " ? "\u00A0" : character;

          element.append(span);
        }

        screenReact(element);

        charIndex += 1;

        let delay =
          (segment.speed ?? baseSpeed) +
          Math.round((Math.random() - .5) * 26);

        if (/[.,?!]/.test(character)) {
          delay += 70;
        }

        if (character === " ") {
          delay -= 8;
        }

        element._typingTimer = window.setTimeout(
          continueTyping,
          Math.max(32, delay)
        );
      }

      element._typingTimer = window.setTimeout(
        continueTyping,
        options.startDelay ?? 0
      );
    }

    function stopPanelTyping() {
      state.textScene += 1;

      stopTyping(t0Text);
      stopTyping(t0Yes);
      stopTyping(t0No);

      actionButtons.forEach(stopTyping);
    }

    function updatePlayer() {
      player.style.left = `${state.playerX}%`;
      player.style.top = `${state.playerY}%`;
    }

    function nearestObject() {
      let nearest = null;
      let shortest = Infinity;

      for (const item of OBJECTS) {
        if (state.destroyed.has(item.id)) {
          continue;
        }

        const current = distance(
          state.playerX,
          state.playerY,
          item.x,
          item.y
        );

        if (current < shortest) {
          shortest = current;
          nearest = item;
        }
      }

      return shortest <= 13 ? nearest : null;
    }

    function updateQuestionSelection() {
      t0Yes.classList.toggle(
        "active",
        state.selectedQuestion === "yes"
      );

      t0No.classList.toggle(
        "active",
        state.selectedQuestion === "no"
      );
    }

    function renderStageEffects() {
      stageEffects.innerHTML = "";

      for (const [id, effect] of state.destroyed.entries()) {
        const item = byId(id);

        if (!item) {
          continue;
        }

        const cover = document.createElement("div");

        cover.className = "screen-cover";
        cover.style.left = `${item.coverX}%`;
        cover.style.top = `${item.coverY}%`;
        cover.style.width = `${item.coverW}%`;
        cover.style.height = `${item.coverH}%`;

        stageEffects.append(cover);

        if (effect === "fallen") {
          const fallen = document.createElement("div");

          fallen.className = "fallen-screen";
          fallen.style.left = `${item.fallenX}%`;
          fallen.style.top = `${item.fallenY}%`;
          fallen.style.setProperty(
            "--tilt",
            item.fallenTilt
          );

          stageEffects.append(fallen);
        }

        if (effect === "void") {
          const hole = document.createElement("div");

          hole.className = "void-screen";
          hole.style.left = `${item.coverX}%`;
          hole.style.top = `${item.coverY}%`;
          hole.style.width = `${item.coverW}%`;
          hole.style.height = `${item.coverH}%`;

          stageEffects.append(hole);
        }
      }
    }

    function destroyScreen(id, effect) {
      state.destroyed.set(id, effect);
      renderStageEffects();
      hideConfirm(true);
    }

    function showConfirm(item) {
      const targetChanged =
        state.confirmId !== item.id;

      const needsReveal =
        confirmButton.hidden ||
        !confirmButton.classList.contains("visible");

      if (confirmHideTimer) {
        clearTimeout(confirmHideTimer);
        confirmHideTimer = null;
      }

      if (targetChanged || confirmButton.hidden) {
        state.confirmId = item.id;
        confirmButton.style.left = `${item.buttonX}%`;
        confirmButton.style.top = `${item.buttonY}%`;
      }

      if (confirmButton.hidden) {
        confirmButton.hidden = false;
        confirmButton.classList.remove("visible");

        void confirmButton.offsetWidth;
      }

      if (needsReveal) {
        requestAnimationFrame(() => {
          confirmButton.classList.add("visible");
        });
      }

      if (targetChanged || !confirmButton.textContent.trim()) {
        typePage(
          confirmButton,
          P(S("확인", { speed: 72 }))
        );
      }
    }

    function hideConfirm(immediate = false) {
      if (confirmButton.hidden) {
        return;
      }

      if (
        !immediate &&
        state.confirmId === null &&
        !confirmButton.classList.contains("visible")
      ) {
        return;
      }

      state.confirmId = null;

      if (confirmHideTimer) {
        clearTimeout(confirmHideTimer);
        confirmHideTimer = null;
      }

      confirmButton.classList.remove("visible");
      stopTyping(confirmButton);

      if (immediate) {
        confirmButton.hidden = true;
        confirmButton.textContent = "";
        return;
      }

      confirmHideTimer = window.setTimeout(() => {
        if (!confirmButton.classList.contains("visible")) {
          confirmButton.hidden = true;
          confirmButton.textContent = "";
        }

        confirmHideTimer = null;
      }, CONFIRM_FADE_MS);
    }

    function updateConfirm() {
      const item =
        state.mode === "free"
          ? nearestObject()
          : null;

      if (!item) {
        hideConfirm();
        return;
      }

      const alreadyCorrect =
        state.confirmId === item.id &&
        !confirmButton.hidden &&
        confirmButton.classList.contains("visible");

      if (!alreadyCorrect) {
        showConfirm(item);
      }
    }

    function setT1Locked(locked) {
      t1Panel.classList.toggle("is-locked", locked);
    }

    function setT1Actions(actions) {
      actionButtons.forEach((button, index) => {
        const action = actions[index];

        stopTyping(button);
        button.textContent = "";
        button.dataset.action = action.id;
        button.classList.toggle(
          "is-long",
          action.label.length > 16
        );
        button.disabled = true;
      });
    }

    function typeT1Actions(actions) {
      const scene = ++state.textScene;
      let delay = 0;

      setT1Actions(actions);

      actionButtons.forEach((button, index) => {
        const action = actions[index];

        typePage(
          button,
          P(S(action.label, { speed: 50 })),
          {
            startDelay: delay,
            onComplete: () => {
              if (scene === state.textScene) {
                button.disabled = false;
              }
            }
          }
        );

        delay += action.label.length * 50 + 100;
      });
    }

    function typeQuestion() {
      const scene = ++state.textScene;

      t0Yes.disabled = true;
      t0No.disabled = true;

      typePage(
        t0Text,
        P(S("스크린을 확인하시겠습니까?", { speed: 62 })),
        {
          onComplete: () => {
            if (scene !== state.textScene) {
              return;
            }

            typePage(
              t0Yes,
              P(S("• 네", { speed: 68 })),
              {
                onComplete: () => {
                  if (scene === state.textScene) {
                    t0Yes.disabled = false;
                  }
                }
              }
            );

            window.setTimeout(() => {
              if (scene !== state.textScene) {
                return;
              }

              typePage(
                t0No,
                P(S("• 아니오", { speed: 68 })),
                {
                  onComplete: () => {
                    if (scene === state.textScene) {
                      t0No.disabled = false;
                    }
                  }
                }
              );
            }, 120);
          }
        }
      );
    }

    function showReadingPage() {
      const reading = state.reading;

      if (!reading) {
        return;
      }

      reading.ready = false;

      typePage(
        t0Text,
        reading.pages[reading.index],
        {
          onComplete: () => {
            if (state.reading === reading) {
              reading.ready = true;
            }
          }
        }
      );
    }

    function startReading(pages, onFinished, options = {}) {
      state.mode = "reading";

      state.reading = {
        pages,
        index: 0,
        ready: false,
        onFinished
      };

      t0Panel.hidden = false;
      t0Panel.classList.add("is-message");
      t0Choices.hidden = true;

      if (options.lockT1) {
        setT1Locked(true);
      }

      showReadingPage();
    }

    function advanceReading() {
      const reading = state.reading;

      if (!reading || !reading.ready) {
        return;
      }

      if (reading.index < reading.pages.length - 1) {
        reading.index += 1;
        showReadingPage();
        return;
      }

      const done = reading.onFinished;

      state.reading = null;

      done?.();
    }

    function closeAllPanels() {
      state.mode = "free";
      state.activeId = null;
      state.reading = null;

      stopPanelTyping();

      t0Panel.hidden = true;
      t1Panel.hidden = true;
      t1Panel.classList.remove("is-locked");
      t0Panel.classList.remove("is-message");

      t0Choices.hidden = false;
      t0Text.textContent = "";
      t0Yes.textContent = "";
      t0No.textContent = "";

      updateConfirm();
    }

    function openT0Question(item) {
      state.mode = "question";
      state.activeId = item.id;
      state.selectedQuestion = "yes";

      hideConfirm(true);
      stopPanelTyping();

      t0Panel.classList.remove("is-message");
      t0Choices.hidden = false;
      t0Panel.hidden = false;
      t1Panel.hidden = true;
      t1Panel.classList.remove("is-locked");

      updateQuestionSelection();
      typeQuestion();
    }

    function openT1Actions() {
      const story = STORIES[state.activeId];

      if (!story) {
        closeAllPanels();
        return;
      }

      state.mode = "actions";

      t0Panel.hidden = false;
      t1Panel.hidden = false;

      setT1Locked(false);
      typeT1Actions(story.actions);
    }

    function answerQuestion(answer) {
      if (state.mode !== "question") {
        return;
      }

      t0Choices.hidden = true;

      stopTyping(t0Yes);
      stopTyping(t0No);

      if (answer === "no") {
        closeAllPanels();
        return;
      }

      const story = STORIES[state.activeId];

      if (!story) {
        closeAllPanels();
        return;
      }

      startReading(
        story.opening,
        () => openT1Actions(),
        {
          lockT1: false
        }
      );
    }

    function returnToBinary() {
      state.mode = "cut";

      cutOverlay.classList.remove("active");
      cutOverlay.classList.add("active", "binary-return");

      window.setTimeout(() => {
        window.location.href = BINARY_RETURN_URL;
      }, 560);
    }

    function runT1Action(actionId) {
      if (state.mode !== "actions") {
        return;
      }

      const story = STORIES[state.activeId];

      const action = story?.actions.find(
        (item) => item.id === actionId
      );

      if (!action) {
        return;
      }

      if (action.returnOnly) {
        closeAllPanels();
        return;
      }

      if (action.returnBinary) {
        returnToBinary();
        return;
      }

      if (action.destroy) {
        destroyScreen(state.activeId, action.destroy);
      }

      startReading(
        action.pages,
        () => closeAllPanels(),
        {
          lockT1: true
        }
      );
    }

    function moveVector() {
      if (joystick.active) {
        return {
          x: joystick.x,
          y: joystick.y
        };
      }

      const x =
        (keys.right ? 1 : 0) -
        (keys.left ? 1 : 0);

      const y =
        (keys.down ? 1 : 0) -
        (keys.up ? 1 : 0);

      const length = Math.hypot(x, y) || 1;

      return {
        x: x / length,
        y: y / length
      };
    }

    function setJoystick(clientX, clientY) {
      const rect = joystickBase.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const maxRadius = rect.width * .28;

      const dx = clientX - centerX;
      const dy = clientY - centerY;

      const length = Math.hypot(dx, dy) || 1;
      const limited = Math.min(length, maxRadius);

      joystick.x =
        (dx / length) *
        (limited / maxRadius);

      joystick.y =
        (dy / length) *
        (limited / maxRadius);

      const knobX = joystick.x * rect.width * .22;
      const knobY = joystick.y * rect.width * .22;

      joystickKnob.style.transform =
        `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.x = 0;
      joystick.y = 0;

      joystickKnob.style.transform =
        "translate(-50%, -50%)";
    }

    confirmButton.addEventListener("click", () => {
      const item = nearestObject();

      if (item) {
        openT0Question(item);
      }
    });

    t0Yes.addEventListener("click", () => {
      answerQuestion("yes");
    });

    t0No.addEventListener("click", () => {
      answerQuestion("no");
    });

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        runT1Action(button.dataset.action);
      });
    });

    document.addEventListener("click", (event) => {
      if (state.mode !== "reading") {
        return;
      }

      if (event.target.closest("button")) {
        return;
      }

      advanceReading();
    });

    joystickBase.addEventListener("pointerdown", (event) => {
      joystick.active = true;

      joystickBase.setPointerCapture(event.pointerId);

      setJoystick(event.clientX, event.clientY);
    });

    joystickBase.addEventListener("pointermove", (event) => {
      if (joystick.active) {
        setJoystick(event.clientX, event.clientY);
      }
    });

    joystickBase.addEventListener("pointerup", resetJoystick);
    joystickBase.addEventListener("pointercancel", resetJoystick);

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      const controlled = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "e",
        "enter",
        " ",
        "1",
        "2",
        "3",
        "4",
        "escape"
      ];

      if (controlled.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        keys.up = true;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = true;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = true;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = true;
      }

      if (state.mode === "free") {
        if (key === "e" || key === "enter") {
          const item = nearestObject();

          if (item) {
            openT0Question(item);
          }
        }

        return;
      }

      if (state.mode === "question") {
        if (key === "arrowup" || key === "arrowleft") {
          state.selectedQuestion = "yes";
          updateQuestionSelection();
        }

        if (key === "arrowdown" || key === "arrowright") {
          state.selectedQuestion = "no";
          updateQuestionSelection();
        }

        if (key === "enter" || key === " ") {
          answerQuestion(state.selectedQuestion);
        }

        return;
      }

      if (state.mode === "reading") {
        if (key === "enter" || key === " ") {
          advanceReading();
        }

        return;
      }

      if (state.mode === "actions") {
        if (key === "1") {
          runT1Action(actionButtons[0].dataset.action);
        }

        if (key === "2") {
          runT1Action(actionButtons[1].dataset.action);
        }

        if (key === "3") {
          runT1Action(actionButtons[2].dataset.action);
        }

        if (key === "4" || key === "escape") {
          runT1Action(actionButtons[3].dataset.action);
        }
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") {
        keys.up = false;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = false;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = false;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = false;
      }
    });

    let lastTime = performance.now();

    function loop(now) {
      const delta = Math.min(
        (now - lastTime) / 1000,
        .05
      );

      lastTime = now;

      if (state.mode === "free") {
        const vector = moveVector();

        const moving =
          vector.x !== 0 ||
          vector.y !== 0;

        player.classList.toggle("walking", moving);

        if (moving) {
          state.playerX = clamp(
            state.playerX + vector.x * 42 * delta,
            7,
            93
          );

          state.playerY = clamp(
            state.playerY + vector.y * 42 * delta,
            46,
            88
          );

          updatePlayer();
        }

        updateConfirm();
      } else {
        player.classList.remove("walking");
      }

      requestAnimationFrame(loop);
    }

    updatePlayer();
    renderStageEffects();
    closeAllPanels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
