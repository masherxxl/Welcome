<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Room - 11101011</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff") format("woff");
      font-display: swap;
    }

    :root {
      --ink: #f7f8ff;
      --blue: #8da1ff;
      --page: #000000;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
    }

    body {
      font-family: "DeterminationK2", monospace;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 16px 12px 24px;
    }

    .room-title {
      margin: 0 0 18px;
      color: #c8c8d4;
      font-size: clamp(18px, 5vw, 34px);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    /*
      연구실 배경
      room-bg.png 파일을 사용
    */
    #room-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1.47 / 1;
      overflow: hidden;
      background:
        #000000
        url("./room-bg.png")
        center center / cover
        no-repeat;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /*
      플레이어
    */
    #player {
      position: absolute;
      left: 50%;
      top: 77%;
      z-index: 5;
      width: 5.3%;
      aspect-ratio: 14 / 22;
      transform: translate(-50%, -50%);
      pointer-events: none;
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.45));
    }

    #player::before {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid #11131d;
      background:
        linear-gradient(
          to bottom,
          #ffffff 0 27%,
          #d5daf4 27% 57%,
          #8c95bc 57% 100%
        );
      clip-path: polygon(
        35% 0%,
        65% 0%,
        73% 10%,
        73% 28%,
        88% 42%,
        82% 57%,
        69% 57%,
        69% 100%,
        56% 100%,
        56% 73%,
        44% 73%,
        44% 100%,
        31% 100%,
        31% 57%,
        18% 57%,
        12% 42%,
        27% 28%,
        27% 10%
      );
    }

    #player::after {
      position: absolute;
      left: 40%;
      top: 18%;
      width: 20%;
      height: 9%;
      content: "";
      background: #080913;
    }

    #player.walking {
      animation: player-bob 0.17s steps(2, end) infinite;
    }

    @keyframes player-bob {
      50% {
        transform: translate(-50%, calc(-50% + 1px));
      }
    }

    /*
      스크린 가까이 갔을 때만 나오는 힌트
    */
    #nearby-hint {
      position: absolute;
      left: 50%;
      bottom: 3.5%;
      z-index: 6;
      padding: 5px 8px 4px;
      border: 1px solid rgba(141, 161, 255, 0.8);
      background: rgba(0, 0, 0, 0.9);
      color: #ffffff;
      font-size: clamp(11px, 3vw, 16px);
      line-height: 1;
      white-space: nowrap;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s linear;
    }

    #nearby-hint.show {
      opacity: 1;
    }

    /*
      T1 큰 대화창
      실제 이미지 비율: 2858 x 1651
      파일명은 반드시 T1.png
    */
    #main-dialog {
      position: relative;
      width: 100%;
      aspect-ratio: 2858 / 1651;
      margin-top: 12px;
    }

    /*
      T0 행동창
      실제 이미지 비율: 4716 x 2164
      파일명은 반드시 T0.PNG
    */
    #action-dialog {
      position: relative;
      width: 100%;
      aspect-ratio: 4716 / 2164;
    }

    .frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /*
      T1 안쪽 글자
    */
    #main-dialog .dialog-content {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 26%;
      gap: 3%;
      padding: 13% 12% 15%;
    }

    #main-text {
      align-self: start;
      color: #ffffff;
      font-size: clamp(14px, 3.9vw, 26px);
      line-height: 1.35;
      letter-spacing: 0.02em;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    #choice-column {
      align-self: start;
      display: grid;
      gap: 10%;
      padding-top: 2%;
    }

    .yn-choice {
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(15px, 3.9vw, 26px);
      line-height: 1.12;
      text-align: left;
      cursor: pointer;
    }

    .yn-choice.active {
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.65);
      transform: translateX(2px);
    }

    /*
      T0 + 조이스틱은 모바일에서도 가로 배치
    */
    #bottom-row {
      display: grid;
      grid-template-columns: minmax(0, 1.58fr) minmax(0, 1fr);
      gap: 10px;
      margin-top: 10px;
      align-items: stretch;
    }

    /*
      아직 조사 전일 때:
      T0는 숨기고 작은 조이스틱만 우측에 둠
    */
    #bottom-row.idle {
      grid-template-columns: 1fr;
      justify-items: end;
    }

    #bottom-row.idle #controller {
      width: min(58%, 260px);
      aspect-ratio: 2.18 / 1;
    }

    /*
      T0 글자
    */
    #action-dialog .action-content {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: start;
      gap: 3%;
      padding: 14% 12% 15%;
    }

    .action-btn {
      width: max-content;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(10px, 3.05vw, 22px);
      line-height: 1.03;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .action-btn:active,
    .action-btn:focus-visible {
      outline: 0;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.7);
      transform: translateX(2px);
    }

    /*
      조이스틱 패널
    */
    #controller {
      position: relative;
      min-width: 0;
      min-height: 0;
      align-self: stretch;
      overflow: hidden;
      border: 2px solid rgba(141, 161, 255, 0.85);
      background: linear-gradient(#05050a, #000000);
      box-shadow:
        inset 0 0 0 4px #000000,
        inset 0 0 0 6px rgba(141, 161, 255, 0.24),
        0 0 8px rgba(141, 161, 255, 0.18);
    }

    #controller::before {
      position: absolute;
      inset: 6px;
      content: "";
      border: 1px solid rgba(141, 161, 255, 0.35);
      pointer-events: none;
    }

    .controller-inner {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 56% 44%;
      align-items: center;
      padding: 9% 8%;
    }

    #joystick-base {
      position: relative;
      justify-self: start;
      width: min(100%, 112px);
      aspect-ratio: 1;
      border: 2px solid rgba(141, 161, 255, 0.8);
      border-radius: 50%;
      background:
        radial-gradient(
          circle,
          rgba(141, 161, 255, 0.08) 0 41%,
          transparent 42%
        ),
        radial-gradient(
          circle,
          #1d2133 0 59%,
          #121522 60% 100%
        );
      box-shadow:
        inset 0 0 0 7px rgba(141, 161, 255, 0.05),
        0 0 8px rgba(141, 161, 255, 0.15);
      touch-action: none;
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 43%;
      aspect-ratio: 1;
      border: 2px solid #0a0a10;
      border-radius: 50%;
      background:
        radial-gradient(
          circle at 36% 31%,
          #ffffff 0 23%,
          #d9ddf5 24% 52%,
          #9da7d8 53% 100%
        );
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .controller-side {
      display: grid;
      min-width: 0;
      justify-items: center;
      align-content: center;
      gap: 13%;
    }

    #interact-button {
      width: 82%;
      max-width: 104px;
      border: 1px solid var(--blue);
      background: #05050a;
      color: #ffffff;
      padding: 9% 4% 7%;
      font-size: clamp(11px, 3vw, 19px);
      line-height: 0.95;
      cursor: pointer;
    }

    #interact-button .sub {
      display: block;
      margin-top: 4px;
      font-size: 0.78em;
    }

    .controller-label {
      color: #d9ddf4;
      font-size: clamp(9px, 2.5vw, 15px);
      line-height: 1.05;
      text-align: center;
    }

    /*
      안을 자세히 들여다본다 -> no-room
    */
    #cut-overlay {
      position: fixed;
      inset: 0;
      z-index: 99;
      background: #000000;
      opacity: 0;
      pointer-events: none;
    }

    #cut-overlay.active {
      opacity: 1;
      animation: cut 0.22s steps(2, end) both;
    }

    @keyframes cut {
      30% {
        background: #ffffff;
      }

      100% {
        background: #000000;
        opacity: 1;
      }
    }

    /*
      아이패드 및 넓은 화면
    */
    @media (min-width: 720px) {
      #app {
        padding: 22px 20px 30px;
      }

      .room-title {
        margin-bottom: 22px;
      }

      #room-stage {
        aspect-ratio: 1.6 / 1;
      }

      #bottom-row {
        gap: 16px;
        margin-top: 14px;
      }

      .controller-inner {
        padding: 8%;
      }

      #joystick-base {
        width: min(100%, 150px);
      }
    }

    /*
      아주 작은 모바일
    */
    @media (max-width: 370px) {
      #app {
        padding-inline: 9px;
      }

      #bottom-row {
        gap: 7px;
      }

      .action-btn {
        font-size: 9px;
      }

      #main-text {
        font-size: 13px;
      }

      .yn-choice {
        font-size: 14px;
      }

      .controller-inner {
        padding-inline: 6%;
      }

      #interact-button {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <h1 class="room-title">Room- 11101011</h1>

    <section id="room-stage" aria-label="미니 연구실">
      <div id="player" aria-hidden="true"></div>
      <div id="nearby-hint" aria-live="polite">스크린 · 조사 가능</div>
    </section>

    <!-- T1: 처음에는 숨김 -->
    <section id="main-dialog" hidden aria-live="polite">
      <img class="frame" src="./T1.png" alt="" />

      <div class="dialog-content">
        <div id="main-text"></div>

        <div id="choice-column" hidden>
          <button class="yn-choice active" id="choice-yes" type="button">• 네</button>
          <button class="yn-choice" id="choice-no" type="button">• 아니오</button>
        </div>
      </div>
    </section>

    <section id="bottom-row" class="idle">
      <!-- T0: 스크린 조사 시에만 표시 -->
      <section id="action-dialog" aria-label="행동 선택" hidden>
        <img class="frame" src="./T0.PNG" alt="" />

        <div class="action-content">
          <button class="action-btn" data-action="inspect" type="button">1. 확인한다</button>
          <button class="action-btn" data-action="drop" type="button">2. 바닥으로 버린다.</button>
          <button class="action-btn" data-action="peek" type="button">3. 안을 자세히 들여다본다.</button>
          <button class="action-btn" data-action="back" type="button">4. 돌아간다</button>
        </div>
      </section>

      <section id="controller" aria-label="조작 패널">
        <div class="controller-inner">
          <div id="joystick-base" aria-label="이동 조이스틱">
            <div id="joystick-knob"></div>
          </div>

          <div class="controller-side">
            <button id="interact-button" type="button">
              A
              <span class="sub">조사</span>
            </button>

            <div class="controller-label">
              이동<br />
              조이스틱
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="cut-overlay" aria-hidden="true"></div>

  <script>
    const NO_ROOM_URL = "no-room.html";

    const OBJECTS = [
      {
        id: "screen01",
        label: "스크린 01",
        x: 15,
        y: 56,
        description:
          "스크린에는 오래된 관측 로그가 남아 있다.\n같은 좌표를 반복해서 가리키는 흔적만 남아 있다."
      },
      {
        id: "screen02",
        label: "스크린 02",
        x: 50,
        y: 56,
        description:
          "화면 안쪽에는 흐릿한 도면이 열려 있다.\n출입문이 아니라, 안쪽으로 향하는 틈처럼 보인다."
      },
      {
        id: "screen03",
        label: "스크린 03",
        x: 84,
        y: 56,
        description:
          "스크린 표면은 멀쩡해 보인다.\n하지만 안쪽에서 미세한 떨림이 계속 느껴진다."
      }
    ];

    const $ = (selector) => document.querySelector(selector);

    const player = $("#player");
    const nearbyHint = $("#nearby-hint");

    const mainDialog = $("#main-dialog");
    const mainText = $("#main-text");
    const choiceColumn = $("#choice-column");
    const choiceYes = $("#choice-yes");
    const choiceNo = $("#choice-no");

    const bottomRow = $("#bottom-row");
    const actionDialog = $("#action-dialog");
    const actionButtons = [...document.querySelectorAll(".action-btn")];

    const interactButton = $("#interact-button");
    const joystickBase = $("#joystick-base");
    const joystickKnob = $("#joystick-knob");
    const cutOverlay = $("#cut-overlay");

    const state = {
      mode: "free",
      playerX: 50,
      playerY: 75,
      activeId: null,
      selectedYN: "yes",
      removed: new Set()
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const joystick = {
      active: false,
      x: 0,
      y: 0
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    const byId = (id) =>
      OBJECTS.find((item) => item.id === id) || null;

    const distance = (a, b, c, d) =>
      Math.hypot(a - c, b - d);

    function updatePlayer() {
      player.style.left = `${state.playerX}%`;
      player.style.top = `${state.playerY}%`;
    }

    function nearestObject() {
      const possible = OBJECTS.filter(
        (item) => !state.removed.has(item.id)
      );

      let closest = null;
      let closestDistance = Infinity;

      for (const item of possible) {
        const currentDistance = distance(
          state.playerX,
          state.playerY,
          item.x,
          item.y
        );

        if (currentDistance < closestDistance) {
          closestDistance = currentDistance;
          closest = item;
        }
      }

      return closestDistance <= 12 ? closest : null;
    }

    function setDialogVisible(visible) {
      mainDialog.hidden = !visible;
    }

    function setActionsVisible(visible) {
      actionDialog.hidden = !visible;
      bottomRow.classList.toggle("idle", !visible);
    }

    function updateYN() {
      choiceYes.classList.toggle(
        "active",
        state.selectedYN === "yes"
      );

      choiceNo.classList.toggle(
        "active",
        state.selectedYN === "no"
      );
    }

    function closePanels() {
      state.mode = "free";
      state.activeId = null;

      choiceColumn.hidden = true;
      setDialogVisible(false);
      setActionsVisible(false);
    }

    function openActionMenu(item) {
      state.mode = "action";
      state.activeId = item.id;

      choiceColumn.hidden = true;
      setDialogVisible(false);
      setActionsVisible(true);
    }

    function setQuestion(item) {
      state.mode = "question";
      state.activeId = item.id;
      state.selectedYN = "yes";

      mainText.textContent = "스크린을 확인하시겠습니까?";
      choiceColumn.hidden = false;

      updateYN();
      setDialogVisible(true);
      setActionsVisible(true);
    }

    function setMessage(text) {
      state.mode = "message";

      mainText.textContent =
        `${text}\n\n[A] 버튼 또는 대화창을 누르면 돌아갑니다.`;

      choiceColumn.hidden = true;

      setDialogVisible(true);
      setActionsVisible(true);
    }

    function chooseYN(value) {
      if (state.mode !== "question") {
        return;
      }

      const item = byId(state.activeId);

      if (!item) {
        closePanels();
        return;
      }

      if (value === "yes") {
        setMessage(item.description);
      } else {
        openActionMenu(item);
      }
    }

    function runAction(action) {
      const item = byId(state.activeId);

      if (action === "back") {
        closePanels();
        return;
      }

      if (!item) {
        closePanels();
        return;
      }

      if (action === "inspect") {
        setQuestion(item);
        return;
      }

      if (action === "drop") {
        state.removed.add(item.id);
        setMessage(`${item.label}을(를) 바닥으로 버렸다.`);
        return;
      }

      if (action === "peek") {
        state.mode = "cut";
        cutOverlay.classList.add("active");

        window.setTimeout(() => {
          window.location.href = NO_ROOM_URL;
        }, 240);
      }
    }

    function interact() {
      if (state.mode === "question") {
        chooseYN(state.selectedYN);
        return;
      }

      if (state.mode === "message") {
        closePanels();
        return;
      }

      if (state.mode === "action") {
        return;
      }

      const item = nearestObject();

      if (item) {
        openActionMenu(item);
      }
    }

    function updateHint() {
      if (state.mode !== "free") {
        nearbyHint.classList.remove("show");
        return;
      }

      const item = nearestObject();

      nearbyHint.classList.toggle("show", Boolean(item));

      if (item) {
        nearbyHint.textContent = `${item.label} · 조사 가능`;
      }
    }

    function movementVector() {
      if (joystick.active) {
        return {
          x: joystick.x,
          y: joystick.y
        };
      }

      const x =
        (keys.right ? 1 : 0) -
        (keys.left ? 1 : 0);

      const y =
        (keys.down ? 1 : 0) -
        (keys.up ? 1 : 0);

      const length = Math.hypot(x, y) || 1;

      return {
        x: x / length,
        y: y / length
      };
    }

    function setJoystickPosition(clientX, clientY) {
      const rect = joystickBase.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const maxDistance = rect.width * 0.28;

      const dx = clientX - centerX;
      const dy = clientY - centerY;

      const totalDistance = Math.hypot(dx, dy) || 1;
      const limitedDistance = Math.min(
        totalDistance,
        maxDistance
      );

      joystick.x =
        (dx / totalDistance) *
        (limitedDistance / maxDistance);

      joystick.y =
        (dy / totalDistance) *
        (limitedDistance / maxDistance);

      const knobX = joystick.x * (rect.width * 0.22);
      const knobY = joystick.y * (rect.width * 0.22);

      joystickKnob.style.transform =
        `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.x = 0;
      joystick.y = 0;

      joystickKnob.style.transform =
        "translate(-50%, -50%)";
    }

    joystickBase.addEventListener("pointerdown", (event) => {
      joystick.active = true;
      joystickBase.setPointerCapture(event.pointerId);

      setJoystickPosition(
        event.clientX,
        event.clientY
      );
    });

    joystickBase.addEventListener("pointermove", (event) => {
      if (!joystick.active) {
        return;
      }

      setJoystickPosition(
        event.clientX,
        event.clientY
      );
    });

    joystickBase.addEventListener("pointerup", resetJoystick);
    joystickBase.addEventListener("pointercancel", resetJoystick);

    interactButton.addEventListener("click", interact);

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        runAction(button.dataset.action);
      });
    });

    choiceYes.addEventListener("click", () => {
      chooseYN("yes");
    });

    choiceNo.addEventListener("click", () => {
      chooseYN("no");
    });

    mainDialog.addEventListener("click", () => {
      if (state.mode === "message") {
        closePanels();
      }
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      const controlledKeys = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "e",
        " ",
        "enter",
        "1",
        "2",
        "3",
        "4",
        "escape"
      ];

      if (controlledKeys.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        keys.up = true;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = true;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = true;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = true;
      }

      if (key === "e" || key === "enter") {
        interact();
      }

      if (state.mode === "question") {
        if (key === "arrowup" || key === "arrowleft") {
          state.selectedYN = "yes";
          updateYN();
        }

        if (key === "arrowdown" || key === "arrowright") {
          state.selectedYN = "no";
          updateYN();
        }

        if (key === " ") {
          chooseYN(state.selectedYN);
        }
      }

      if (state.mode === "action") {
        if (key === "1") {
          runAction("inspect");
        }

        if (key === "2") {
          runAction("drop");
        }

        if (key === "3") {
          runAction("peek");
        }

        if (key === "4" || key === "escape") {
          runAction("back");
        }
      }

      if (state.mode === "message" && key === " ") {
        closePanels();
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") {
        keys.up = false;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = false;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = false;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = false;
      }
    });

    let lastTime = performance.now();

    function loop(currentTime) {
      const deltaTime = Math.min(
        (currentTime - lastTime) / 1000,
        0.05
      );

      lastTime = currentTime;

      if (state.mode === "free") {
        const vector = movementVector();

        const isMoving =
          vector.x !== 0 ||
          vector.y !== 0;

        player.classList.toggle("walking", isMoving);

        if (isMoving) {
          state.playerX = clamp(
            state.playerX + vector.x * 20 * deltaTime,
            7,
            93
          );

          state.playerY = clamp(
            state.playerY + vector.y * 20 * deltaTime,
            46,
            88
          );

          updatePlayer();
        }

        updateHint();
      } else {
        player.classList.remove("walking");
        updateHint();
      }

      requestAnimationFrame(loop);
    }

    updatePlayer();
    closePanels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
