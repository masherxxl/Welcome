<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Room - 11101011</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff") format("woff");
      font-display: swap;
    }

    :root {
      --ink: #f8f8ff;
      --blue: #8ea2ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000000;
      color: var(--ink);
      font-family: "DeterminationK2", monospace;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 18px 14px 30px;
    }

    .room-title {
      margin: 0 0 18px;
      color: #c8c8d4;
      font-size: clamp(18px, 5.2vw, 30px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    /*
      연구실 배경
      cover + scale로 원본보다 조금 크게 보이게 처리
    */
    #room-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1.52 / 1;
      overflow: hidden;
      background: #000000;
    }

    #room-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 49%;
      transform: scale(1.13);
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
    }

    #player {
      position: absolute;
      left: 50%;
      top: 76%;
      z-index: 2;
      width: 5.4%;
      aspect-ratio: 14 / 22;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.55));
      pointer-events: none;
    }

    #player::before {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid #0b0c14;
      background:
        linear-gradient(
          to bottom,
          #ffffff 0 27%,
          #d9def8 27% 58%,
          #8a94c0 58% 100%
        );
      clip-path: polygon(
        35% 0%,
        65% 0%,
        74% 10%,
        74% 28%,
        88% 42%,
        82% 57%,
        69% 57%,
        69% 100%,
        56% 100%,
        56% 73%,
        44% 73%,
        44% 100%,
        31% 100%,
        31% 57%,
        18% 57%,
        12% 42%,
        26% 28%,
        26% 10%
      );
    }

    #player::after {
      position: absolute;
      left: 40%;
      top: 18%;
      width: 20%;
      height: 9%;
      content: "";
      background: #05050a;
    }

    #player.walking {
      animation: player-bob 0.17s steps(2, end) infinite;
    }

    @keyframes player-bob {
      50% {
        transform: translate(-50%, calc(-50% + 1px));
      }
    }

    /*
      이 영역은 처음부터 같은 크기를 유지함.
      T0, T1, 조이스틱은 위치가 절대 바뀌지 않고
      보이거나 숨겨지기만 함.
    */
    #ui-zone {
      position: relative;
      width: 100%;
      height: clamp(300px, 88vw, 455px);
      margin-top: 18px;
    }

    /*
      T1 = 4개 행동 선택창
      T0에서 네를 눌렀을 때만 표시
    */
    #t1-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      aspect-ratio: 2470 / 1271;
      overflow: hidden;
    }

    #t1-panel .frame-crop,
    #t0-panel .frame-crop {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    #t1-panel .frame-crop img {
      position: absolute;
      left: -7.17%;
      top: -14.71%;
      width: 115.71%;
      height: 129.9%;
      max-width: none;
      image-rendering: pixelated;
      user-select: none;
    }

    #t1-panel .content {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: start;
      gap: 6.2%;
      padding: 13.2% 10% 11%;
    }

    .t1-action {
      width: max-content;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(13px, 3.55vw, 24px);
      line-height: 1.04;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .t1-action:active,
    .t1-action:focus-visible {
      outline: 0;
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.78);
    }

    /*
      T0 = 네 / 아니오 질문창
      A 조사 버튼을 눌렀을 때만 표시
    */
    #t0-panel {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 73%;
      aspect-ratio: 4355 / 1774;
      overflow: hidden;
    }

    #t0-panel .frame-crop img {
      position: absolute;
      left: -3.88%;
      top: -11.44%;
      width: 108.77%;
      height: 121.98%;
      max-width: none;
      image-rendering: pixelated;
      user-select: none;
    }

    #t0-panel .content {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 25%;
      gap: 3%;
      padding: 16% 9% 13% 8%;
    }

    #t0-question {
      align-self: start;
      color: #ffffff;
      font-size: clamp(11px, 3.15vw, 21px);
      line-height: 1.25;
      white-space: nowrap;
    }

    #t0-choices {
      display: grid;
      align-content: start;
      gap: 20%;
      padding-top: 1%;
    }

    .t0-choice {
      width: max-content;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(11px, 3.1vw, 21px);
      line-height: 1.1;
      text-align: left;
      cursor: pointer;
    }

    .t0-choice.active {
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.78);
    }

    /*
      조이스틱: 항상 우하단 같은 자리
    */
    #controller {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 23%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 2px solid rgba(142, 162, 255, 0.88);
      background: linear-gradient(#080814, #000000);
      box-shadow:
        inset 0 0 0 4px #000000,
        inset 0 0 0 6px rgba(142, 162, 255, 0.24),
        0 0 8px rgba(142, 162, 255, 0.16);
    }

    #controller::before {
      position: absolute;
      inset: 6px;
      content: "";
      border: 1px solid rgba(142, 162, 255, 0.36);
      pointer-events: none;
    }

    .controller-inner {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: center;
      justify-items: center;
      padding: 10% 13% 10%;
      gap: 8%;
    }

    #interact-button {
      width: 44%;
      min-width: 28px;
      aspect-ratio: 1 / 0.72;
      border: 1px solid var(--blue);
      background: #06060c;
      color: #ffffff;
      padding: 0;
      font-size: clamp(10px, 2.9vw, 19px);
      line-height: 1;
      cursor: pointer;
    }

    #joystick-base {
      position: relative;
      align-self: end;
      width: 77%;
      aspect-ratio: 1;
      border: 2px solid rgba(142, 162, 255, 0.8);
      border-radius: 50%;
      background:
        radial-gradient(
          circle,
          rgba(142, 162, 255, 0.08) 0 42%,
          transparent 43%
        ),
        radial-gradient(
          circle,
          #1d2134 0 59%,
          #111420 60% 100%
        );
      box-shadow:
        inset 0 0 0 6px rgba(142, 162, 255, 0.06),
        0 0 7px rgba(142, 162, 255, 0.15);
      touch-action: none;
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 43%;
      aspect-ratio: 1;
      border: 2px solid #090a10;
      border-radius: 50%;
      background:
        radial-gradient(
          circle at 36% 31%,
          #ffffff 0 23%,
          #dde1f7 24% 52%,
          #9ca7d9 53%
        );
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #info-note {
      position: absolute;
      inset: 0;
      display: none;
      align-content: center;
      padding: 14% 10%;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.72);
      font-size: clamp(13px, 3.4vw, 22px);
      line-height: 1.28;
      white-space: pre-wrap;
      cursor: pointer;
    }

    #info-note.show {
      display: grid;
    }

    #cut-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      background: #000000;
    }

    #cut-overlay.active {
      opacity: 1;
      animation: cut 0.22s steps(2, end) both;
    }

    @keyframes cut {
      30% {
        background: #ffffff;
      }

      100% {
        background: #000000;
        opacity: 1;
      }
    }

    @media (min-width: 700px) {
      #app {
        width: min(92vw, 960px);
        padding: 24px 24px 36px;
      }

      .room-title {
        font-size: 32px;
      }

      #ui-zone {
        height: min(64vw, 615px);
      }

      .t1-action {
        font-size: 24px;
      }

      #t0-question,
      .t0-choice {
        font-size: 21px;
      }

      #controller {
        width: 20%;
      }
    }

    @media (max-width: 360px) {
      #app {
        padding-inline: 10px;
      }

      #ui-zone {
        height: 300px;
      }

      .t1-action {
        font-size: 12px;
      }

      #t0-question,
      .t0-choice {
        font-size: 10px;
      }

      #controller {
        width: 24%;
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <h1 class="room-title">Room- 11101011</h1>

    <section id="room-stage" aria-label="미니 연구실">
      <img id="room-bg" src="./room-bg.png" alt="">
      <div id="player" aria-hidden="true"></div>
    </section>

    <section id="ui-zone" aria-label="연구실 조작 인터페이스">
      <section id="t1-panel" hidden aria-label="행동 선택">
        <div class="frame-crop">
          <img src="./T1.png" alt="">
        </div>

        <div class="content" id="t1-actions">
          <button class="t1-action" data-action="inspect" type="button">
            1. 조사한다
          </button>

          <button class="t1-action" data-action="drop" type="button">
            2. 바닥으로 버린다.
          </button>

          <button class="t1-action" data-action="peek" type="button">
            3. 안을 자세히 들여다 본다.
          </button>

          <button class="t1-action" data-action="quit" type="button">
            4. 관둔다
          </button>
        </div>

        <div id="info-note" role="button" tabindex="0"></div>
      </section>

      <section id="t0-panel" hidden aria-label="스크린 확인 질문">
        <div class="frame-crop">
          <img src="./T0.PNG" alt="">
        </div>

        <div class="content">
          <div id="t0-question">
            스크린을 확인하시겠습니까?
          </div>

          <div id="t0-choices">
            <button class="t0-choice active" id="t0-yes" type="button">
              • 네
            </button>

            <button class="t0-choice" id="t0-no" type="button">
              • 아니오
            </button>
          </div>
        </div>
      </section>

      <section id="controller" aria-label="조작 패널">
        <div class="controller-inner">
          <button id="interact-button" type="button" aria-label="조사">
            A
          </button>

          <div id="joystick-base" aria-label="이동 조이스틱">
            <div id="joystick-knob"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="cut-overlay" aria-hidden="true"></div>

  <script>
    const NO_ROOM_URL = "no-room.html";

    const OBJECTS = [
      {
        id: "screen01",
        x: 15,
        y: 56,
        description:
          "스크린에는 오래된 관측 로그가 남아 있다.\n같은 좌표를 반복해서 가리키는 흔적만 남아 있다."
      },
      {
        id: "screen02",
        x: 50,
        y: 56,
        description:
          "화면 안쪽에는 흐릿한 도면이 열려 있다.\n출입문이 아니라, 안쪽으로 향하는 틈처럼 보인다."
      },
      {
        id: "screen03",
        x: 84,
        y: 56,
        description:
          "스크린 표면은 멀쩡해 보인다.\n하지만 안쪽에서 미세한 떨림이 계속 느껴진다."
      }
    ];

    const $ = (selector) => document.querySelector(selector);

    const player = $("#player");
    const t0Panel = $("#t0-panel");
    const t1Panel = $("#t1-panel");
    const t0Yes = $("#t0-yes");
    const t0No = $("#t0-no");
    const infoNote = $("#info-note");
    const interactButton = $("#interact-button");
    const joystickBase = $("#joystick-base");
    const joystickKnob = $("#joystick-knob");
    const cutOverlay = $("#cut-overlay");

    const actionButtons = [
      ...document.querySelectorAll(".t1-action")
    ];

    const state = {
      mode: "free",
      playerX: 50,
      playerY: 75,
      activeId: null,
      selectedQuestion: "yes",
      removed: new Set()
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const joystick = {
      active: false,
      x: 0,
      y: 0
    };

    const clamp = (value, min, max) =>
      Math.max(min, Math.min(max, value));

    const byId = (id) =>
      OBJECTS.find((item) => item.id === id) || null;

    const distance = (a, b, c, d) =>
      Math.hypot(a - c, b - d);

    function updatePlayer() {
      player.style.left = `${state.playerX}%`;
      player.style.top = `${state.playerY}%`;
    }

    function nearestObject() {
      let nearest = null;
      let shortest = Infinity;

      for (const item of OBJECTS) {
        if (state.removed.has(item.id)) {
          continue;
        }

        const current = distance(
          state.playerX,
          state.playerY,
          item.x,
          item.y
        );

        if (current < shortest) {
          shortest = current;
          nearest = item;
        }
      }

      return shortest <= 12 ? nearest : null;
    }

    function updateQuestionSelection() {
      t0Yes.classList.toggle(
        "active",
        state.selectedQuestion === "yes"
      );

      t0No.classList.toggle(
        "active",
        state.selectedQuestion === "no"
      );
    }

    function closeAllPanels() {
      state.mode = "free";
      state.activeId = null;

      t0Panel.hidden = true;
      t1Panel.hidden = true;
      infoNote.classList.remove("show");
    }

    function openT0Question(item) {
      state.mode = "question";
      state.activeId = item.id;
      state.selectedQuestion = "yes";

      t0Panel.hidden = false;
      t1Panel.hidden = true;
      infoNote.classList.remove("show");

      updateQuestionSelection();
    }

    function openT1Actions() {
      if (!state.activeId) {
        return;
      }

      state.mode = "actions";

      /*
        T0는 그대로 유지.
        T1만 추가로 표시.
      */
      t0Panel.hidden = false;
      t1Panel.hidden = false;
      infoNote.classList.remove("show");
    }

    function openInfo(text) {
      state.mode = "info";
      infoNote.textContent =
        `${text}\n\n누르면 행동 목록으로 돌아갑니다.`;

      infoNote.classList.add("show");
    }

    function closeInfo() {
      infoNote.classList.remove("show");
      state.mode = "actions";
    }

    function answerQuestion(answer) {
      if (state.mode !== "question") {
        return;
      }

      if (answer === "yes") {
        openT1Actions();
      } else {
        closeAllPanels();
      }
    }

    function runT1Action(action) {
      const item = byId(state.activeId);

      if (!item) {
        closeAllPanels();
        return;
      }

      if (action === "inspect") {
        openInfo(item.description);
        return;
      }

      if (action === "drop") {
        state.removed.add(item.id);
        openInfo("스크린을 바닥으로 버렸다.");
        return;
      }

      if (action === "peek") {
        state.mode = "cut";
        cutOverlay.classList.add("active");

        window.setTimeout(() => {
          window.location.href = NO_ROOM_URL;
        }, 240);

        return;
      }

      if (action === "quit") {
        closeAllPanels();
      }
    }

    function interact() {
      if (state.mode === "question") {
        answerQuestion(state.selectedQuestion);
        return;
      }

      if (state.mode === "info") {
        closeInfo();
        return;
      }

      if (state.mode === "actions") {
        return;
      }

      if (state.mode !== "free") {
        return;
      }

      const item = nearestObject();

      if (item) {
        openT0Question(item);
      }
    }

    function currentMoveVector() {
      if (joystick.active) {
        return {
          x: joystick.x,
          y: joystick.y
        };
      }

      const x =
        (keys.right ? 1 : 0) -
        (keys.left ? 1 : 0);

      const y =
        (keys.down ? 1 : 0) -
        (keys.up ? 1 : 0);

      const length = Math.hypot(x, y) || 1;

      return {
        x: x / length,
        y: y / length
      };
    }

    function setJoystick(clientX, clientY) {
      const rect = joystickBase.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const maxRadius = rect.width * 0.28;

      const dx = clientX - centerX;
      const dy = clientY - centerY;

      const length = Math.hypot(dx, dy) || 1;
      const limited = Math.min(length, maxRadius);

      joystick.x =
        (dx / length) *
        (limited / maxRadius);

      joystick.y =
        (dy / length) *
        (limited / maxRadius);

      const knobX = joystick.x * rect.width * 0.22;
      const knobY = joystick.y * rect.width * 0.22;

      joystickKnob.style.transform =
        `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.x = 0;
      joystick.y = 0;

      joystickKnob.style.transform =
        "translate(-50%, -50%)";
    }

    joystickBase.addEventListener("pointerdown", (event) => {
      joystick.active = true;
      joystickBase.setPointerCapture(event.pointerId);

      setJoystick(event.clientX, event.clientY);
    });

    joystickBase.addEventListener("pointermove", (event) => {
      if (joystick.active) {
        setJoystick(event.clientX, event.clientY);
      }
    });

    joystickBase.addEventListener("pointerup", resetJoystick);
    joystickBase.addEventListener("pointercancel", resetJoystick);

    interactButton.addEventListener("click", interact);

    t0Yes.addEventListener("click", () => {
      answerQuestion("yes");
    });

    t0No.addEventListener("click", () => {
      answerQuestion("no");
    });

    infoNote.addEventListener("click", closeInfo);

    infoNote.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        closeInfo();
      }
    });

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        runT1Action(button.dataset.action);
      });
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      const controlled = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "e",
        "enter",
        " ",
        "1",
        "2",
        "3",
        "4",
        "escape"
      ];

      if (controlled.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        keys.up = true;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = true;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = true;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = true;
      }

      if (state.mode === "question") {
        if (key === "arrowup" || key === "arrowleft") {
          state.selectedQuestion = "yes";
          updateQuestionSelection();
        }

        if (key === "arrowdown" || key === "arrowright") {
          state.selectedQuestion = "no";
          updateQuestionSelection();
        }

        if (key === "enter" || key === " ") {
          answerQuestion(state.selectedQuestion);
        }

        return;
      }

      if (state.mode === "actions") {
        if (key === "1") {
          runT1Action("inspect");
        }

        if (key === "2") {
          runT1Action("drop");
        }

        if (key === "3") {
          runT1Action("peek");
        }

        if (key === "4" || key === "escape") {
          runT1Action("quit");
        }

        return;
      }

      if (state.mode === "info") {
        if (key === "enter" || key === " " || key === "escape") {
          closeInfo();
        }

        return;
      }

      if (key === "e" || key === "enter") {
        interact();
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") {
        keys.up = false;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = false;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = false;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = false;
      }
    });

    let lastTime = performance.now();

    function loop(now) {
      const delta = Math.min(
        (now - lastTime) / 1000,
        0.05
      );

      lastTime = now;

      if (state.mode === "free") {
        const vector = currentMoveVector();

        const moving =
          vector.x !== 0 ||
          vector.y !== 0;

        player.classList.toggle("walking", moving);

        if (moving) {
          state.playerX = clamp(
            state.playerX + vector.x * 20 * delta,
            7,
            93
          );

          state.playerY = clamp(
            state.playerY + vector.y * 20 * delta,
            46,
            88
          );

          updatePlayer();
        }
      } else {
        player.classList.remove("walking");
      }

      requestAnimationFrame(loop);
    }

    updatePlayer();
    closeAllPanels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
