<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Room - 11101011</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff") format("woff");
      font-display: swap;
    }

    :root {
      --ink: #f8f8ff;
      --blue: #8ea2ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000000;
      color: var(--ink);
      font-family: "DeterminationK2", monospace;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      width: min(100%, 440px);
      margin: 0 auto;
      padding: 17px 14px 26px;
    }

    .room-title {
      margin: 0 0 16px;
      color: #c6c6d1;
      font-size: clamp(18px, 5.4vw, 28px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.035em;
    }

    #game-shell {
      width: 100%;
    }

    /*
      연구실 이미지 원본 크기: 772 x 764
      파일명: room-bg.png
    */
    #room-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 772 / 764;
      overflow: hidden;
      background: #000000;
      image-rendering: pixelated;
    }

    #room-bg {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
    }

    /*
      플레이어
    */
    #player {
      position: absolute;
      left: 50%;
      top: 76%;
      z-index: 4;
      width: 5.3%;
      aspect-ratio: 14 / 22;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.55));
      pointer-events: none;
    }

    #player::before {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid #0d0e16;
      background:
        linear-gradient(
          to bottom,
          #ffffff 0 27%,
          #d8def9 27% 58%,
          #8c96c1 58% 100%
        );
      clip-path: polygon(
        35% 0%,
        65% 0%,
        74% 10%,
        74% 28%,
        88% 42%,
        82% 57%,
        69% 57%,
        69% 100%,
        56% 100%,
        56% 73%,
        44% 73%,
        44% 100%,
        31% 100%,
        31% 57%,
        18% 57%,
        12% 42%,
        26% 28%,
        26% 10%
      );
    }

    #player::after {
      position: absolute;
      left: 40%;
      top: 18%;
      width: 20%;
      height: 9%;
      content: "";
      background: #05050a;
    }

    #player.walking {
      animation: player-bob 0.17s steps(2, end) infinite;
    }

    @keyframes player-bob {
      50% {
        transform: translate(-50%, calc(-50% + 1px));
      }
    }

    #nearby-hint {
      position: absolute;
      left: 50%;
      bottom: 4%;
      z-index: 6;
      padding: 5px 8px 4px;
      border: 1px solid rgba(142, 162, 255, 0.85);
      background: rgba(0, 0, 0, 0.9);
      color: #ffffff;
      font-size: clamp(10px, 2.9vw, 14px);
      line-height: 1;
      white-space: nowrap;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s linear;
    }

    #nearby-hint.show {
      opacity: 1;
    }

    /*
      시작할 때 조이스틱은 연구실 오른쪽 아래에 작게 있음
    */
    #stage-controller-anchor {
      position: absolute;
      right: 3.5%;
      bottom: 3.5%;
      z-index: 7;
      width: 44%;
      aspect-ratio: 2.18 / 1;
    }

    /*
      T1 원본 크기: 2858 x 1651
      파일명: T1.png
    */
    #main-dialog {
      position: relative;
      width: 100%;
      aspect-ratio: 2858 / 1651;
      margin-top: 10px;
    }

    /*
      T0 원본 크기: 4716 x 2164
      파일명: T0.PNG
    */
    #action-dialog {
      position: relative;
      width: 100%;
      aspect-ratio: 4716 / 2164;
    }

    .frame {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      image-rendering: pixelated;
    }

    /*
      T1 안쪽 글자
    */
    #main-dialog .dialog-content {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 27%;
      gap: 2%;
      padding: 13% 11% 14%;
    }

    #main-text {
      align-self: start;
      white-space: pre-wrap;
      word-break: keep-all;
      font-size: clamp(13px, 3.8vw, 21px);
      line-height: 1.28;
      letter-spacing: 0.01em;
    }

    #choice-column {
      align-self: start;
      display: grid;
      gap: 11%;
      padding-top: 1%;
    }

    .yn-choice {
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(13px, 3.8vw, 21px);
      line-height: 1.1;
      text-align: left;
      cursor: pointer;
    }

    .yn-choice.active {
      transform: translateX(2px);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.75);
    }

    /*
      T0 왼쪽 + 조이스틱 오른쪽
    */
    #bottom-row {
      display: grid;
      grid-template-columns: minmax(0, 1.58fr) minmax(0, 1fr);
      gap: 9px;
      margin-top: 9px;
      align-items: stretch;
    }

    #bottom-controller-slot {
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    #action-dialog .action-content {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: start;
      gap: 3%;
      padding: 13% 12% 13%;
    }

    .action-btn {
      display: block;
      width: max-content;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-size: clamp(8px, 2.62vw, 15px);
      line-height: 1.05;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .action-btn:focus-visible,
    .action-btn:active {
      outline: 0;
      transform: translateX(2px);
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
    }

    /*
      조이스틱 패널
    */
    #controller {
      position: absolute;
      inset: 0;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 2px solid rgba(142, 162, 255, 0.86);
      background: linear-gradient(#070710, #000000);
      box-shadow:
        inset 0 0 0 4px #000000,
        inset 0 0 0 6px rgba(142, 162, 255, 0.24),
        0 0 8px rgba(142, 162, 255, 0.16);
    }

    #controller::before {
      position: absolute;
      inset: 6px;
      content: "";
      border: 1px solid rgba(142, 162, 255, 0.36);
      pointer-events: none;
    }

    .controller-inner {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 56% 44%;
      align-items: center;
      padding: 8% 8%;
    }

    #joystick-base {
      position: relative;
      justify-self: start;
      width: min(100%, 104px);
      aspect-ratio: 1;
      border: 2px solid rgba(142, 162, 255, 0.8);
      border-radius: 50%;
      background:
        radial-gradient(
          circle,
          rgba(142, 162, 255, 0.08) 0 42%,
          transparent 43%
        ),
        radial-gradient(
          circle,
          #1d2133 0 59%,
          #111420 60%
        );
      box-shadow:
        inset 0 0 0 6px rgba(142, 162, 255, 0.06),
        0 0 7px rgba(142, 162, 255, 0.15);
      touch-action: none;
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 43%;
      aspect-ratio: 1;
      border: 2px solid #090a10;
      border-radius: 50%;
      background:
        radial-gradient(
          circle at 36% 31%,
          #ffffff 0 23%,
          #dde1f7 24% 52%,
          #9ca7d9 53%
        );
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .controller-side {
      display: grid;
      min-width: 0;
      justify-items: center;
      align-content: center;
      gap: 14%;
    }

    #interact-button {
      width: 83%;
      max-width: 94px;
      border: 1px solid var(--blue);
      background: #05050a;
      color: #ffffff;
      padding: 9% 4% 7%;
      font-size: clamp(10px, 2.7vw, 16px);
      line-height: 0.95;
      cursor: pointer;
    }

    #interact-button .sub {
      display: block;
      margin-top: 3px;
      font-size: 0.78em;
    }

    .controller-label {
      color: #d7dcf7;
      font-size: clamp(8px, 2.3vw, 13px);
      line-height: 1.05;
      text-align: center;
    }

    #cut-overlay {
      position: fixed;
      inset: 0;
      z-index: 99;
      background: #000000;
      opacity: 0;
      pointer-events: none;
    }

    #cut-overlay.active {
      opacity: 1;
      animation: cut 0.22s steps(2, end) both;
    }

    @keyframes cut {
      30% {
        background: #ffffff;
      }

      100% {
        background: #000000;
        opacity: 1;
      }
    }

    /*
      아이패드/가로 화면
    */
    @media (min-width: 720px) {
      #app {
        width: min(92vw, 920px);
        padding: 24px 22px 32px;
      }

      .room-title {
        margin-bottom: 20px;
        font-size: 32px;
      }

      #room-stage {
        aspect-ratio: 772 / 650;
      }

      #stage-controller-anchor {
        width: 32%;
        right: 4%;
        bottom: 4%;
      }

      #bottom-row {
        gap: 16px;
        margin-top: 16px;
      }

      .action-btn {
        font-size: 21px;
      }

      #main-text,
      .yn-choice {
        font-size: 30px;
      }

      #joystick-base {
        width: min(100%, 150px);
      }
    }

    @media (max-width: 360px) {
      #app {
        padding-inline: 10px;
      }

      .action-btn {
        font-size: 8px;
      }

      #main-text,
      .yn-choice {
        font-size: 12px;
      }

      .controller-inner {
        padding-inline: 6%;
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <h1 class="room-title">Room- 11101011</h1>

    <section id="game-shell">
      <section id="room-stage" aria-label="미니 연구실">
        <img id="room-bg" src="./room-bg.png" alt="">

        <div id="player" aria-hidden="true"></div>
        <div id="nearby-hint" aria-live="polite">
          스크린 · 조사 가능
        </div>

        <div id="stage-controller-anchor" aria-label="이동 조작 패널"></div>
      </section>

      <section id="main-dialog" hidden aria-live="polite">
        <img class="frame" src="./T1.png" alt="">

        <div class="dialog-content">
          <div id="main-text"></div>

          <div id="choice-column" hidden>
            <button class="yn-choice active" id="choice-yes" type="button">
              • 네
            </button>

            <button class="yn-choice" id="choice-no" type="button">
              • 아니오
            </button>
          </div>
        </div>
      </section>

      <section id="bottom-row" hidden aria-label="행동 선택과 조작 패널">
        <section id="action-dialog" aria-label="행동 선택">
          <img class="frame" src="./T0.PNG" alt="">

          <div class="action-content">
            <button class="action-btn" data-action="inspect" type="button">
              1. 확인한다
            </button>

            <button class="action-btn" data-action="drop" type="button">
              2. 바닥으로 버린다.
            </button>

            <button class="action-btn" data-action="peek" type="button">
              3. 안을 자세히 들여다본다.
            </button>

            <button class="action-btn" data-action="back" type="button">
              4. 돌아간다
            </button>
          </div>
        </section>

        <div id="bottom-controller-slot"></div>
      </section>

      <section id="controller" aria-label="조작 패널">
        <div class="controller-inner">
          <div id="joystick-base" aria-label="이동 조이스틱">
            <div id="joystick-knob"></div>
          </div>

          <div class="controller-side">
            <button id="interact-button" type="button">
              A
              <span class="sub">조사</span>
            </button>

            <div class="controller-label">
              이동<br>
              조이스틱
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="cut-overlay" aria-hidden="true"></div>

  <script>
    const NO_ROOM_URL = "no-room.html";

    const OBJECTS = [
      {
        id: "screen01",
        label: "스크린 01",
        x: 15,
        y: 56,
        description:
          "스크린에는 오래된 관측 로그가 남아 있다.\n같은 좌표를 반복해서 가리키는 흔적만 남아 있다."
      },
      {
        id: "screen02",
        label: "스크린 02",
        x: 50,
        y: 56,
        description:
          "화면 안쪽에는 흐릿한 도면이 열려 있다.\n출입문이 아니라, 안쪽으로 향하는 틈처럼 보인다."
      },
      {
        id: "screen03",
        label: "스크린 03",
        x: 84,
        y: 56,
        description:
          "스크린 표면은 멀쩡해 보인다.\n하지만 안쪽에서 미세한 떨림이 계속 느껴진다."
      }
    ];

    const $ = (selector) => document.querySelector(selector);

    const stageAnchor = $("#stage-controller-anchor");
    const bottomSlot = $("#bottom-controller-slot");
    const controller = $("#controller");

    const player = $("#player");
    const nearbyHint = $("#nearby-hint");

    const mainDialog = $("#main-dialog");
    const mainText = $("#main-text");
    const choiceColumn = $("#choice-column");
    const choiceYes = $("#choice-yes");
    const choiceNo = $("#choice-no");

    const bottomRow = $("#bottom-row");
    const interactButton = $("#interact-button");
    const joystickBase = $("#joystick-base");
    const joystickKnob = $("#joystick-knob");
    const cutOverlay = $("#cut-overlay");

    const actionButtons = [
      ...document.querySelectorAll(".action-btn")
    ];

    const state = {
      mode: "free",
      playerX: 50,
      playerY: 75,
      activeId: null,
      selectedYN: "yes",
      removed: new Set()
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    const joystick = {
      active: false,
      x: 0,
      y: 0
    };

    const clamp = (value, min, max) =>
      Math.max(min, Math.min(max, value));

    const byId = (id) =>
      OBJECTS.find((item) => item.id === id) || null;

    const distance = (a, b, c, d) =>
      Math.hypot(a - c, b - d);

    function moveController(target) {
      target.append(controller);
    }

    function updatePlayer() {
      player.style.left = `${state.playerX}%`;
      player.style.top = `${state.playerY}%`;
    }

    function nearestObject() {
      let nearest = null;
      let minimumDistance = Infinity;

      for (const item of OBJECTS) {
        if (state.removed.has(item.id)) {
          continue;
        }

        const currentDistance = distance(
          state.playerX,
          state.playerY,
          item.x,
          item.y
        );

        if (currentDistance < minimumDistance) {
          minimumDistance = currentDistance;
          nearest = item;
        }
      }

      return minimumDistance <= 12 ? nearest : null;
    }

    function updateYN() {
      choiceYes.classList.toggle(
        "active",
        state.selectedYN === "yes"
      );

      choiceNo.classList.toggle(
        "active",
        state.selectedYN === "no"
      );
    }

    function closePanels() {
      state.mode = "free";
      state.activeId = null;

      mainDialog.hidden = true;
      bottomRow.hidden = true;
      choiceColumn.hidden = true;

      moveController(stageAnchor);
    }

    function openActionMenu(item) {
      state.mode = "action";
      state.activeId = item.id;

      mainDialog.hidden = true;
      choiceColumn.hidden = true;
      bottomRow.hidden = false;

      moveController(bottomSlot);
    }

    function openQuestion(item) {
      state.mode = "question";
      state.activeId = item.id;
      state.selectedYN = "yes";

      mainText.textContent = "스크린을 확인하시겠습니까?";

      choiceColumn.hidden = false;
      mainDialog.hidden = false;
      bottomRow.hidden = false;

      moveController(bottomSlot);
      updateYN();
    }

    function openMessage(text) {
      state.mode = "message";

      mainText.textContent =
        `${text}\n\n[A] 버튼 또는 대화창을 누르면 돌아갑니다.`;

      choiceColumn.hidden = true;
      mainDialog.hidden = false;
      bottomRow.hidden = false;

      moveController(bottomSlot);
    }

    function chooseYN(value) {
      if (state.mode !== "question") {
        return;
      }

      const item = byId(state.activeId);

      if (!item) {
        closePanels();
        return;
      }

      if (value === "yes") {
        openMessage(item.description);
      } else {
        openActionMenu(item);
      }
    }

    function runAction(action) {
      const item = byId(state.activeId);

      if (action === "back") {
        closePanels();
        return;
      }

      if (!item) {
        closePanels();
        return;
      }

      if (action === "inspect") {
        openQuestion(item);
        return;
      }

      if (action === "drop") {
        state.removed.add(item.id);
        openMessage(`${item.label}을(를) 바닥으로 버렸다.`);
        return;
      }

      if (action === "peek") {
        state.mode = "cut";
        cutOverlay.classList.add("active");

        window.setTimeout(() => {
          window.location.href = NO_ROOM_URL;
        }, 240);
      }
    }

    function interact() {
      if (state.mode === "question") {
        chooseYN(state.selectedYN);
        return;
      }

      if (state.mode === "message") {
        closePanels();
        return;
      }

      if (state.mode === "action") {
        return;
      }

      const item = nearestObject();

      if (item) {
        openActionMenu(item);
      }
    }

    function updateHint() {
      if (state.mode !== "free") {
        nearbyHint.classList.remove("show");
        return;
      }

      const item = nearestObject();

      nearbyHint.classList.toggle("show", Boolean(item));

      if (item) {
        nearbyHint.textContent = `${item.label} · 조사 가능`;
      }
    }

    function moveVector() {
      if (joystick.active) {
        return {
          x: joystick.x,
          y: joystick.y
        };
      }

      const x =
        (keys.right ? 1 : 0) -
        (keys.left ? 1 : 0);

      const y =
        (keys.down ? 1 : 0) -
        (keys.up ? 1 : 0);

      const length = Math.hypot(x, y) || 1;

      return {
        x: x / length,
        y: y / length
      };
    }

    function setJoystick(clientX, clientY) {
      const rect = joystickBase.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const maxDistance = rect.width * 0.28;

      const dx = clientX - centerX;
      const dy = clientY - centerY;

      const totalDistance = Math.hypot(dx, dy) || 1;
      const limitedDistance = Math.min(
        totalDistance,
        maxDistance
      );

      joystick.x =
        (dx / totalDistance) *
        (limitedDistance / maxDistance);

      joystick.y =
        (dy / totalDistance) *
        (limitedDistance / maxDistance);

      const knobX = joystick.x * rect.width * 0.22;
      const knobY = joystick.y * rect.width * 0.22;

      joystickKnob.style.transform =
        `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.x = 0;
      joystick.y = 0;

      joystickKnob.style.transform =
        "translate(-50%, -50%)";
    }

    joystickBase.addEventListener("pointerdown", (event) => {
      joystick.active = true;
      joystickBase.setPointerCapture(event.pointerId);

      setJoystick(event.clientX, event.clientY);
    });

    joystickBase.addEventListener("pointermove", (event) => {
      if (joystick.active) {
        setJoystick(event.clientX, event.clientY);
      }
    });

    joystickBase.addEventListener("pointerup", resetJoystick);
    joystickBase.addEventListener("pointercancel", resetJoystick);

    interactButton.addEventListener("click", interact);

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        runAction(button.dataset.action);
      });
    });

    choiceYes.addEventListener("click", () => {
      chooseYN("yes");
    });

    choiceNo.addEventListener("click", () => {
      chooseYN("no");
    });

    mainDialog.addEventListener("click", () => {
      if (state.mode === "message") {
        closePanels();
      }
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      const controlledKeys = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "e",
        " ",
        "enter",
        "1",
        "2",
        "3",
        "4",
        "escape"
      ];

      if (controlledKeys.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        keys.up = true;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = true;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = true;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = true;
      }

      if (key === "e" || key === "enter") {
        interact();
      }

      if (state.mode === "question") {
        if (key === "arrowup" || key === "arrowleft") {
          state.selectedYN = "yes";
          updateYN();
        }

        if (key === "arrowdown" || key === "arrowright") {
          state.selectedYN = "no";
          updateYN();
        }

        if (key === " ") {
          chooseYN(state.selectedYN);
        }
      }

      if (state.mode === "action") {
        if (key === "1") {
          runAction("inspect");
        }

        if (key === "2") {
          runAction("drop");
        }

        if (key === "3") {
          runAction("peek");
        }

        if (key === "4" || key === "escape") {
          runAction("back");
        }
      }

      if (state.mode === "message" && key === " ") {
        closePanels();
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "arrowup" || key === "w") {
        keys.up = false;
      }

      if (key === "arrowdown" || key === "s") {
        keys.down = false;
      }

      if (key === "arrowleft" || key === "a") {
        keys.left = false;
      }

      if (key === "arrowright" || key === "d") {
        keys.right = false;
      }
    });

    let lastTime = performance.now();

    function loop(currentTime) {
      const deltaTime = Math.min(
        (currentTime - lastTime) / 1000,
        0.05
      );

      lastTime = currentTime;

      if (state.mode === "free") {
        const vector = moveVector();

        const moving =
          vector.x !== 0 ||
          vector.y !== 0;

        player.classList.toggle("walking", moving);

        if (moving) {
          state.playerX = clamp(
            state.playerX + vector.x * 20 * deltaTime,
            7,
            93
          );

          state.playerY = clamp(
            state.playerY + vector.y * 20 * deltaTime,
            46,
            88
          );

          updatePlayer();
        }

        updateHint();
      } else {
        player.classList.remove("walking");
        updateHint();
      }

      requestAnimationFrame(loop);
    }

    updatePlayer();
    closePanels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
