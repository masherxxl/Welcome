<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Error!</title>

  <link
    rel="preload"
    href="./determination-sans-k2.ttf?v=4"
    as="font"
    type="font/ttf"
    crossorigin
  />

  <style>
    @font-face {
      font-family: "DeterminationSansK2";
      src: url("./determination-sans-k2.ttf?v=4") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      opacity: 0;
      font-family: "DeterminationSansK2", monospace;
      transition: opacity 0.25s ease;
    }

    body.font-ready {
      opacity: 1;
    }

    .error-title {
      position: fixed;
      top: 25px;
      left: 28px;
      z-index: 2;
      margin: 0;
      color: #f2f2f2;
      font-family: "DeterminationSansK2", monospace;

      /*
        ===== Error! 글자 크기 수정 구역 =====
        첫 숫자 = 최소 크기
        가운데 숫자 = 화면 크기에 따라 바뀌는 크기
        마지막 숫자 = 최대 크기
      */
      font-size: clamp(1.35rem, 4.8vw, 2.3rem);

      font-weight: 400;
      letter-spacing: -0.06em;

      /*
        Error!에는 글로우 없음
      */
      text-shadow: none;

      animation: title-appear 0.75s steps(3, end) both;
    }

    @keyframes title-appear {
      0% {
        opacity: 0;
        filter: blur(5px);
        transform: translate(-4px, 1px);
      }

      60% {
        opacity: 0.8;
        transform: translate(2px, -1px);
      }

      100% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 0);
      }
    }

    .message-area {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    .message {
      width: min(100%, 640px);
      margin: 0;
      color: #eeeeee;
      font-family: "DeterminationSansK2", monospace;
      font-size: clamp(1.15rem, 4.8vw, 1.9rem);
      font-weight: 400;
      letter-spacing: -0.05em;
      line-height: 1.75;
      text-align: center;

      /*
        본문 글자만 은은한 흰빛 글로우
      */
      text-shadow:
        0 0 3px rgba(255, 255, 255, 0.48),
        0 0 10px rgba(255, 255, 255, 0.2);
    }

    .typed-char {
      display: inline-block;
      animation: character-arrive 0.34s steps(2, end) both;
    }

    @keyframes character-arrive {
      0% {
        opacity: 0;
        filter: blur(4px);
        transform: translate(-2px, 2px);
        text-shadow:
          -2px 0 rgba(255, 40, 40, 0.55),
          2px 0 rgba(0, 220, 255, 0.55);
      }

      30% {
        opacity: 0.35;
        transform: translate(2px, -1px);
      }

      58% {
        opacity: 1;
        filter: blur(0);
        transform: translate(-1px, 0);
      }

      100% {
        opacity: 1;
        transform: translate(0, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <h1 class="error-title">Error!</h1>

  <main class="message-area">
    <p id="typed-message" class="message"></p>
  </main>

  <script>
    /*
      ===== 이진1 대사 수정 구역 =====
      나중에 문장을 바꾸고 싶으면 아래 따옴표 안만 수정하면 됨.
    */
    const errorMessage = "잘못된 방에 입장하셨습니다.";

    /*
      ===== 타이핑 속도 수정 구역 =====
      숫자가 커질수록 더 느려짐.
    */
    const typingSettings = {
      startDelay: 950,
      minimumDelay: 220,
      maximumDelay: 460,
      spaceExtraDelay: 190,
      punctuationExtraDelay: 520,
      strangePauseChance: 0.2,
      strangePauseMinimum: 230,
      strangePauseMaximum: 680
    };

    const typedMessage = document.getElementById("typed-message");

    let characterIndex = 0;

    function randomNumber(minimum, maximum) {
      return Math.floor(
        Math.random() * (maximum - minimum + 1) + minimum
      );
    }

    function getTypingDelay(character) {
      let delay = randomNumber(
        typingSettings.minimumDelay,
        typingSettings.maximumDelay
      );

      if (character === " ") {
        delay += typingSettings.spaceExtraDelay;
      }

      if ([".", "!", "?", "…"].includes(character)) {
        delay += typingSettings.punctuationExtraDelay;
      }

      if (Math.random() < typingSettings.strangePauseChance) {
        delay += randomNumber(
          typingSettings.strangePauseMinimum,
          typingSettings.strangePauseMaximum
        );
      }

      return delay;
    }

    function typeNextCharacter() {
      if (characterIndex >= errorMessage.length) {
        return;
      }

      const character = errorMessage[characterIndex];
      const characterElement = document.createElement("span");

      characterElement.className = "typed-char";
      characterElement.textContent =
        character === " " ? "\u00A0" : character;

      typedMessage.appendChild(characterElement);

      characterIndex += 1;

      setTimeout(
        typeNextCharacter,
        getTypingDelay(character)
      );
    }

    async function prepareFontAndStart() {
      try {
        await document.fonts.load(
          '400 16px "DeterminationSansK2"'
        );

        await document.fonts.ready;
      } catch (error) {
        console.warn("Font loading failed.", error);
      }

      document.body.classList.add("font-ready");

      setTimeout(
        typeNextCharacter,
        typingSettings.startDelay
      );
    }

    prepareFontAndStart();
  </script>
</body>
</html>
