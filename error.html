<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Error!</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=1") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=1") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    html,
    body,
    .error-title,
    .message,
    .typed-char {
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif !important;
      font-synthesis: none;
    }

    body {
      overflow: hidden;
      color: #ffffff;
    }

    /* ===== 좌측 상단 Error! ===== */

    .error-title {
      position: fixed;
      top: 22px;
      left: 24px;
      z-index: 2;
      margin: 0;
      color: #f5f5ff;

      /*
        ===== Error! 크기 수정 구역 =====
        마지막 숫자 1.7rem을 줄이면 더 작아짐.
      */
      font-size: clamp(1.05rem, 4.3vw, 1.7rem);

      font-weight: 400;
      letter-spacing: -0.08em;

      /* Error!에는 글로우 없음 */
      text-shadow: none;

      animation: title-appear 0.55s steps(3, end) both;
    }

    @keyframes title-appear {
      0% {
        opacity: 0;
        transform: translate(-2px, 1px);
      }

      50% {
        opacity: 0.7;
        transform: translate(1px, 0);
      }

      100% {
        opacity: 1;
        transform: translate(0, 0);
      }
    }

    /* ===== 중앙 메시지 ===== */

    .message-area {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    .message {
      width: min(100%, 640px);
      margin: 0;
      color: #f5f5ff;
      font-size: clamp(1.15rem, 4.8vw, 1.9rem);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.75;
      text-align: center;

      /* 본문에만 은은한 흰 글로우 */
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.9),
        0 0 18px rgba(255, 255, 255, 0.72);
    }

    .typed-char {
      display: inline-block;
      animation: character-arrive 0.26s steps(2, end) both;
    }

    @keyframes character-arrive {
      0% {
        opacity: 0;
        transform: translate(-1px, 1px);
        text-shadow:
          0 0 2px rgba(255, 255, 255, 0.35);
      }

      45% {
        opacity: 0.55;
        transform: translate(1px, 0);
      }

      100% {
        opacity: 1;
        transform: translate(0, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <h1 class="error-title">Error!</h1>

  <main class="message-area">
    <p id="typed-message" class="message"></p>
  </main>

  <script>
    /*
      ===== 이진1 대사 수정 구역 =====
      여기 따옴표 안 문장만 바꾸면 됨.
    */
    const errorMessage = "잘못된 방에 입장하셨습니다.";

    /*
      ===== 타이핑 속도 수정 구역 =====
      숫자가 클수록 느려짐.
    */
    const typingSettings = {
      startDelay: 900,
      minimumDelay: 230,
      maximumDelay: 460,
      spaceExtraDelay: 160,
      punctuationExtraDelay: 520,
      strangePauseChance: 0.16,
      strangePauseMinimum: 180,
      strangePauseMaximum: 520
    };

    const typedMessage = document.getElementById("typed-message");

    let characterIndex = 0;

    function randomNumber(minimum, maximum) {
      return Math.floor(
        Math.random() * (maximum - minimum + 1) + minimum
      );
    }

    function getTypingDelay(character) {
      let delay = randomNumber(
        typingSettings.minimumDelay,
        typingSettings.maximumDelay
      );

      if (character === " ") {
        delay += typingSettings.spaceExtraDelay;
      }

      if ([".", "!", "?", "…"].includes(character)) {
        delay += typingSettings.punctuationExtraDelay;
      }

      if (Math.random() < typingSettings.strangePauseChance) {
        delay += randomNumber(
          typingSettings.strangePauseMinimum,
          typingSettings.strangePauseMaximum
        );
      }

      return delay;
    }

    function typeNextCharacter() {
      if (characterIndex >= errorMessage.length) {
        return;
      }

      const character = errorMessage[characterIndex];
      const characterElement = document.createElement("span");

      characterElement.className = "typed-char";
      characterElement.textContent =
        character === " " ? "\u00A0" : character;

      typedMessage.appendChild(characterElement);

      characterIndex += 1;

      setTimeout(
        typeNextCharacter,
        getTypingDelay(character)
      );
    }

    setTimeout(
      typeNextCharacter,
      typingSettings.startDelay
    );
  </script>
</body>
</html>
