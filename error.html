<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Error!</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=2") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=2") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    html,
    body,
    .error-title,
    .message {
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif !important;
      font-synthesis: none;
    }

    body {
      overflow: hidden;
      color: #ffffff;
    }

    /* =========================================================
       !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
       Error! 글자 크기 변경 구역

       마지막 숫자 2.15rem을 줄이면 Error!가 작아짐
       마지막 숫자 2.15rem을 늘리면 Error!가 커짐
       ========================================================= */

    .error-title {
      position: fixed;
      top: 24px;
      left: 26px;
      z-index: 2;
      margin: 0;
      color: #f5f5ff;

      font-size: clamp(1.45rem, 5.5vw, 2.15rem);

      font-weight: 400;

      /* ======================================================
         !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
         Error! 자간 변경 구역

         숫자가 커질수록 글자 사이가 넓어짐
         ====================================================== */
      letter-spacing: 0.02em;

      /* Error!은 원래부터 박혀 있던 것처럼: 효과 없음 */
      text-shadow: none;
      animation: none;
      transform: none;
      opacity: 1;
    }

    .message-area {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    /* =========================================================
       !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
       중앙 메시지 글자 크기 변경 구역

       마지막 숫자 2.45rem을 줄이면 작아짐
       마지막 숫자 2.45rem을 늘리면 커짐
       ========================================================= */

    .message {
      width: min(100%, 660px);
      margin: 0;
      color: #f5f5ff;

      font-size: clamp(1.5rem, 6vw, 2.45rem);

      font-weight: 400;
      line-height: 1.7;
      text-align: center;
      white-space: pre-wrap;

      /* ======================================================
         !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
         중앙 메시지 자간 변경 구역

         숫자가 커질수록 글자 사이가 넓어짐
         ====================================================== */
      letter-spacing: 0.06em;

      /* 본문에만 은은한 흰빛 글로우 */
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.72),
        0 0 15px rgba(255, 255, 255, 0.38);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <h1 class="error-title">Error!</h1>

  <main class="message-area">
    <p id="typed-message" class="message"></p>
  </main>

  <script>
    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진1 방 대사 수정 구역

      따옴표 안의 문장만 바꾸면 됨.
      ========================================================
    */
    const errorMessage = "잘못된 방에 입장하셨습니다.";

    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      타이핑 속도 수정 구역

      숫자가 커질수록 한 글자씩 나오는 속도가 느려짐.
      언더테일처럼 글자 하나당 일정한 간격으로
      딱. 딱. 딱. 나타나는 방식
      ========================================================
    */
    const typingSettings = {
      startDelay: 950,
      characterDelay: 180
    };

    const typedMessage = document.getElementById("typed-message");
    const messageTextNode = document.createTextNode("");

    typedMessage.appendChild(messageTextNode);

    let characterIndex = 0;

    function typeNextCharacter() {
      if (characterIndex >= errorMessage.length) {
        return;
      }

      messageTextNode.textContent += errorMessage[characterIndex];
      characterIndex += 1;

      setTimeout(
        typeNextCharacter,
        typingSettings.characterDelay
      );
    }

    setTimeout(
      typeNextCharacter,
      typingSettings.startDelay
    );
  </script>
</body>
</html>
