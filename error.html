<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Error!</title>

  <style>
    @font-face {
      font-family: "Determination Sans K2";
      src: url("determination-sans-k2.ttf") format("truetype");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      font-family: "Determination Sans K2", monospace;
    }

    .error-title {
      position: fixed;
      top: 26px;
      left: 28px;
      z-index: 2;
      margin: 0;
      padding-right: 0.12em;
      color: #f4f4f4;
      font-family: "Determination Sans K2", monospace;
      font-size: clamp(1.9rem, 7vw, 3.15rem);
      font-weight: 400;
      letter-spacing: -0.09em;
      text-shadow:
        0 0 3px rgba(255, 255, 255, 0.9),
        0 0 10px rgba(255, 255, 255, 0.42),
        0 0 22px rgba(255, 255, 255, 0.16);
      animation: title-appear 0.75s steps(3, end) both;
    }

    @keyframes title-appear {
      0% {
        opacity: 0;
        filter: blur(5px);
        transform: translate(-4px, 1px);
      }

      60% {
        opacity: 0.8;
        transform: translate(2px, -1px);
      }

      100% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 0);
      }
    }

    .message-area {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    .message {
      width: min(100%, 640px);
      margin: 0;
      color: #eeeeee;
      font-family: "Determination Sans K2", monospace;
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.05em;
      line-height: 1.75;
      text-align: center;
      text-shadow:
        0 0 3px rgba(255, 255, 255, 0.78),
        0 0 11px rgba(255, 255, 255, 0.32),
        0 0 22px rgba(255, 255, 255, 0.12);
    }

    .typed-char {
      display: inline-block;
      animation: character-arrive 0.34s steps(2, end) both;
    }

    @keyframes character-arrive {
      0% {
        opacity: 0;
        filter: blur(4px);
        transform: translate(-2px, 2px);
        text-shadow:
          -2px 0 rgba(255, 40, 40, 0.7),
          2px 0 rgba(0, 220, 255, 0.7);
      }

      30% {
        opacity: 0.35;
        transform: translate(2px, -1px);
      }

      58% {
        opacity: 1;
        filter: blur(0);
        transform: translate(-1px, 0);
      }

      100% {
        opacity: 1;
        transform: translate(0, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <h1 class="error-title">Error!</h1>

  <main class="message-area">
    <p id="typed-message" class="message"></p>
  </main>

  <script>
    /*
      ===== 이진1 대사 수정 구역 =====
      나중에 문장을 바꾸고 싶으면 아래 따옴표 안만 수정하면 됨.
    */
    const errorMessage = "잘못된 방에 입장하셨습니다.";

    /*
      ===== 타이핑 속도 수정 구역 =====
      숫자가 클수록 더 느려짐.
      지금은 일부러 속도가 들쭉날쭉하게 설정되어 있음.
    */
    const typingSettings = {
      startDelay: 900,
      minimumDelay: 210,
      maximumDelay: 430,
      spaceExtraDelay: 180,
      punctuationExtraDelay: 470,
      strangePauseChance: 0.18,
      strangePauseMinimum: 220,
      strangePauseMaximum: 650
    };

    const typedMessage = document.getElementById("typed-message");

    let characterIndex = 0;

    function randomNumber(minimum, maximum) {
      return Math.floor(
        Math.random() * (maximum - minimum + 1) + minimum
      );
    }

    function getTypingDelay(character) {
      let delay = randomNumber(
        typingSettings.minimumDelay,
        typingSettings.maximumDelay
      );

      if (character === " ") {
        delay += typingSettings.spaceExtraDelay;
      }

      if ([".", "!", "?", "…"].includes(character)) {
        delay += typingSettings.punctuationExtraDelay;
      }

      if (Math.random() < typingSettings.strangePauseChance) {
        delay += randomNumber(
          typingSettings.strangePauseMinimum,
          typingSettings.strangePauseMaximum
        );
      }

      return delay;
    }

    function typeNextCharacter() {
      if (characterIndex >= errorMessage.length) {
        return;
      }

      const character = errorMessage[characterIndex];
      const characterElement = document.createElement("span");

      characterElement.className = "typed-char";
      characterElement.textContent =
        character === " " ? "\u00A0" : character;

      typedMessage.appendChild(characterElement);

      characterIndex += 1;

      setTimeout(
        typeNextCharacter,
        getTypingDelay(character)
      );
    }

    setTimeout(typeNextCharacter, typingSettings.startDelay);
  </script>
</body>
</html>
