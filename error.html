<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error!</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=13") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=13") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif;
      font-synthesis: none;
      -webkit-tap-highlight-color: transparent;
    }

    .error-title {
      position: fixed;
      top: 24px;
      left: 26px;
      z-index: 2;
      margin: 0;
      color: #f5f5ff;
      font-size: clamp(1.45rem, 5.5vw, 2.15rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .message-area {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    .message {
      width: min(100%, 660px);
      min-height: 1.7em;
      margin: 0;
      color: #f5f5ff;
      font-size: clamp(1.5rem, 6vw, 2.45rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1.7;
      text-align: center;
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.72),
        0 0 15px rgba(255, 255, 255, 0.38);
      white-space: pre-wrap;
    }

    .typed-char {
      display: inline-block;
      min-width: 0.01em;
      transform-origin: center;
      animation: text-tick 0.08s steps(2, end) both;
    }

    @keyframes text-tick {
      0% {
        opacity: 0;
        filter: brightness(1.8);
        transform: translate(0, 1px);
      }

      50% {
        opacity: 1;
        filter: brightness(1.35);
        transform: translate(1px, 0);
      }

      100% {
        opacity: 1;
        filter: brightness(1);
        transform: translate(0, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .typed-char {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <h1 class="error-title">Error!</h1>

  <main class="message-area">
    <p id="typed-message" class="message" aria-live="polite"></p>
  </main>

  <script>
    const errorMessage = "잘못된 방에 입장하셨습니다.";

    /*
      두 에러룸이 같은 소리를 쓰도록 파일 이름을 맞춰뒀어.
      GitHub 맨 위 폴더에 error-type-01.mp3를 올리면 바로 재생됨.

      다른 소리도 섞고 싶으면 아래처럼 한 줄을 더 추가하면 됨.
      "error-type-02.mp3",
    */
    const textSoundFiles = [
      "error-type-01.mp3"
    ];

    const textSoundVolume = 0.16;

    const typingSettings = {
      startDelay: 950,
      characterDelay: 72,
      wordPause: 230,
      punctuationPause: 260
    };

    const typedMessage = document.getElementById("typed-message");
    const characters = Array.from(errorMessage);

    const soundSources = textSoundFiles.map((fileName) => {
      const audio = new Audio(fileName);

      audio.preload = "auto";
      audio.volume = textSoundVolume;

      return audio;
    });

    let characterIndex = 0;

    function playTextSound() {
      if (!soundSources.length) {
        return;
      }

      const source = soundSources[
        Math.floor(Math.random() * soundSources.length)
      ];

      const sound = source.cloneNode();

      sound.volume = textSoundVolume;
      sound.playbackRate = 0.98 + Math.random() * 0.04;

      sound.play().catch(() => {});
    }

    function getNextDelay(character) {
      let delay = typingSettings.characterDelay;

      if (character === " ") {
        delay += typingSettings.wordPause;
      }

      if (/[.!?,]/.test(character)) {
        delay += typingSettings.punctuationPause;
      }

      return delay;
    }

    function typeNextCharacter() {
      if (characterIndex >= characters.length) {
        return;
      }

      const character = characters[characterIndex];
      const characterElement = document.createElement("span");

      characterElement.className = "typed-char";
      characterElement.textContent = character === " " ? "\u00A0" : character;

      typedMessage.appendChild(characterElement);

      /*
        공백은 단어 멈춤 역할만 하고,
        실제 글자가 뜰 때만 커스텀 비프가 재생됨.
      */
      if (character !== " ") {
        playTextSound();
      }

      characterIndex += 1;

      if (characterIndex >= characters.length) {
        return;
      }

      setTimeout(
        typeNextCharacter,
        getNextDelay(character)
      );
    }

    setTimeout(
      typeNextCharacter,
      typingSettings.startDelay
    );
  </script>
</body>
</html>
