<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Error!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Handjet:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    @font-face {
      font-family: "Computer Says No";
      src: url("computer-says-no.woff2") format("woff2");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    body {
      overflow: hidden;
      color: #ffffff;
    }

    .error-title {
      position: fixed;
      top: 25px;
      left: 28px;
      margin: 0;
      color: #eeeeee;
      font-family: "Computer Says No", "Handjet", monospace;
      font-size: clamp(1.8rem, 7vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .message-area {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    .message {
      width: min(100%, 620px);
      margin: 0;
      color: #efefef;
      font-family: "Noto Sans KR", sans-serif;
      font-size: clamp(1.1rem, 4.5vw, 1.8rem);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.8;
    }

    .cursor {
      display: inline-block;
      width: 0.65ch;
      height: 1.1em;
      margin-left: 3px;
      vertical-align: -0.15em;
      background: #ffffff;
      animation: cursor-blink 0.8s steps(2, end) infinite;
    }

    @keyframes cursor-blink {
      0%,
      45% {
        opacity: 1;
      }

      46%,
      100% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <h1 class="error-title">Error!</h1>

  <main class="message-area">
    <p class="message">
      <span id="typed-message"></span><span class="cursor" aria-hidden="true"></span>
    </p>
  </main>

  <script>
    const message = "잘못된 방에 입장하셨습니다.";
    const typedMessage = document.getElementById("typed-message");

    let index = 0;

    setTimeout(() => {
      const typing = setInterval(() => {
        typedMessage.textContent += message[index];
        index += 1;

        if (index >= message.length) {
          clearInterval(typing);
        }
      }, 115);
    }, 700);
  </script>
</body>
</html>
