<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WELCOME</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #ffffff;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
    }

    main {
      text-align: center;
      padding: 32px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 12vw, 7rem);
      letter-spacing: 0.18em;
      font-weight: 400;
    }

    p {
      margin-top: 22px;
      color: #bdbdbd;
      letter-spacing: 0.12em;
      font-size: 0.9rem;
    }

    button {
      margin-top: 42px;
      padding: 14px 24px;
      border: 1px solid #ffffff;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
    }

    button:hover {
      background: #ffffff;
      color: #000000;
    }
  </style>
</head>

<body>
  <main>
    <h1>WELCOME</h1>
    <p>YOU ARE ALREADY INSIDE.</p>

    <button onclick="alert('...')">
      ENTER
    </button>
  </main>
</body>
</html>
