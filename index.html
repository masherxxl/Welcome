<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WELCOME</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #000000;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    #entrance {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 32px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.18em;
    }

    #entrance p {
      margin: 22px 0 0;
      color: #bdbdbd;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
    }

    #enter-button {
      margin-top: 42px;
      padding: 14px 24px;
      border: 1px solid #ffffff;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
    }

    #enter-button:hover {
      background: #ffffff;
      color: #000000;
    }

    #comic {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    #comic img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <section id="entrance">
    <div>
      <h1>WELCOME</h1>
      <p>YOU ARE ALREADY INSIDE.</p>

      <button id="enter-button">
        ENTER
      </button>
    </div>
  </section>

  <main id="comic">
    <img src="0.png" alt="WELCOME comic part 1" />
    <img src="00.png" alt="WELCOME comic part 2" />
    <img src="000.png" alt="WELCOME comic part 3" />
  </main>

  <script>
    const enterButton = document.getElementById("enter-button");
    const comic = document.getElementById("comic");

    enterButton.addEventListener("click", () => {
      comic.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    });
  </script>
</body>
</html>
