<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=13") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=13") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #room-content {
      position: relative;
      min-height: 100svh;
      padding: 24px;
      opacity: 1;
      transition: opacity 0.36s steps(3, end);
    }

    #room-content.leaving {
      opacity: 0;
      pointer-events: none;
    }

    .error-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(1.1rem, 4.4vw, 1.65rem);
      font-weight: 400;
      letter-spacing: -0.05em;
      line-height: 1;
      text-shadow:
        0 0 4px rgba(255, 255, 255, 0.88),
        0 0 13px rgba(255, 255, 255, 0.36);
    }

    .message-area {
      margin-top: 38px;
      max-width: min(88vw, 610px);
    }

    #error-message {
      min-height: 1.6em;
      margin: 0;
      color: #f7f7f7;
      font-size: clamp(1.28rem, 5.2vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.015em;
      line-height: 1.58;
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.82),
        0 0 16px rgba(255, 255, 255, 0.34);
      white-space: pre-wrap;
    }

    .typed-char {
      display: inline-block;
      min-width: 0.01em;
      transform-origin: center;
      animation: text-tick 0.08s steps(2, end) both;
    }

    @keyframes text-tick {
      0% {
        opacity: 0;
        filter: brightness(1.8);
        transform: translate(0, 1px);
      }

      50% {
        opacity: 1;
        filter: brightness(1.35);
        transform: translate(1px, 0);
      }

      100% {
        opacity: 1;
        filter: brightness(1);
        transform: translate(0, 0);
      }
    }

    #door-art-wrap {
      position: fixed;
      right: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      width: min(86vw, 440px);
      pointer-events: none;
      transform: translateX(50%);
    }

    #door-art {
      display: none;
      width: 100%;
      max-height: 36svh;
      object-fit: contain;
      image-rendering: pixelated;
      filter:
        drop-shadow(0 0 4px rgba(255, 255, 255, 0.35));
    }

    #door-art.loaded {
      display: block;
    }

    #screen-blackout {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: #000000;
      opacity: 0;
      transition: opacity 0.14s steps(2, end);
    }

    #screen-blackout.active {
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      #room-content,
      .typed-char {
        animation: none !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <main id="room-content">
    <h1 class="error-title">Error!</h1>

    <section class="message-area">
      <p id="error-message" aria-live="polite"></p>
    </section>

    <div id="door-art-wrap" aria-hidden="true">
      <img id="door-art" alt="" />
    </div>
  </main>

  <div id="screen-blackout" aria-hidden="true"></div>

  <script>
    const errorDoorsFile = "";

    /*
      GitHub 맨 위 폴더에
      error-type-01.mp3
      파일을 올리면 두 에러룸에서 같은 비프 소리가 남.
    */
    const textSoundFiles = [
      "error-type-01.mp3"
    ];

    const textSoundVolume = 0.16;

    const errorMessage = "잘못된 방에 입장했습니다.";

    const timing = {
      startDelay: 420,
      characterDelay: 60,
      wordPause: 220,
      punctuationPause: 250,
      fadeDuration: 360,
      blackHold: 2000
    };

    const roomContent = document.getElementById("room-content");
    const messageElement = document.getElementById("error-message");
    const doorArt = document.getElementById("door-art");
    const screenBlackout = document.getElementById("screen-blackout");

    const soundSources = textSoundFiles.map((fileName) => {
      const audio = new Audio(fileName);

      audio.preload = "auto";
      audio.volume = textSoundVolume;

      return audio;
    });

    let typingFinished = false;
    let isLeaving = false;
    let characterIndex = 0;

    if (errorDoorsFile) {
      doorArt.src = errorDoorsFile;

      doorArt.addEventListener("load", () => {
        doorArt.classList.add("loaded");
      });
    }

    function randomRange(minimum, maximum) {
      return Math.random() * (maximum - minimum) + minimum;
    }

    function playTextSound() {
      if (!soundSources.length) {
        return;
      }

      const source = soundSources[
        Math.floor(Math.random() * soundSources.length)
      ];

      const sound = source.cloneNode();

      sound.volume = textSoundVolume;
      sound.playbackRate = randomRange(0.98, 1.02);

      sound.play().catch(() => {});
    }

    function getNextDelay(character) {
      let delay = timing.characterDelay;

      if (character === " ") {
        delay += timing.wordPause;
      }

      if (/[.!?,]/.test(character)) {
        delay += timing.punctuationPause;
      }

      return delay;
    }

    function typeNextCharacter() {
      const characters = Array.from(errorMessage);

      if (characterIndex >= characters.length) {
        typingFinished = true;
        return;
      }

      const character = characters[characterIndex];
      const characterElement = document.createElement("span");

      characterElement.className = "typed-char";
      characterElement.textContent = character === " " ? "\u00A0" : character;

      messageElement.appendChild(characterElement);

      if (character !== " ") {
        playTextSound();
      }

      characterIndex += 1;

      if (characterIndex >= characters.length) {
        typingFinished = true;
        return;
      }

      setTimeout(
        typeNextCharacter,
        getNextDelay(character)
      );
    }

    function leaveRoom() {
      if (!typingFinished || isLeaving) {
        return;
      }

      isLeaving = true;
      roomContent.classList.add("leaving");

      setTimeout(() => {
        screenBlackout.classList.add("active");
      }, timing.fadeDuration);

      setTimeout(() => {
        window.location.replace(
          "index.html?return=binary#binary-stage"
        );
      }, timing.fadeDuration + timing.blackHold);
    }

    document.addEventListener("pointerup", leaveRoom);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        leaveRoom();
      }
    });

    setTimeout(
      typeNextCharacter,
      timing.startDelay
    );
  </script>
</body>
</html>
