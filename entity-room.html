<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title></title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=5") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=5") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    html,
    body,
    #room-message,
    .room-char {
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif !important;
      font-synthesis: none;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .room-stage {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    #room-message {
      width: min(100%, 660px);
      margin: 0;
      color: #f5f5ff;
      font-size: clamp(1.5rem, 6vw, 2.45rem);
      font-weight: 400;
      line-height: 1.7;
      text-align: center;
      white-space: pre-wrap;
      letter-spacing: 0.07em;
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.72),
        0 0 15px rgba(255, 255, 255, 0.38);
    }

    .room-char {
      display: inline-block;
      min-width: 0.01em;
      transform-origin: center;
      animation:
        room-char-tremble var(--jitter-duration) steps(2, end)
        var(--jitter-delay) infinite;
    }

    @keyframes room-char-tremble {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      18% {
        transform: translate(var(--jx1), var(--jy1)) rotate(var(--r1));
      }

      39% {
        transform: translate(var(--jx2), var(--jy2)) rotate(var(--r2));
      }

      63% {
        transform: translate(var(--jx3), var(--jy3)) rotate(var(--r3));
      }

      82% {
        transform: translate(var(--jx4), var(--jy4)) rotate(var(--r4));
      }
    }

    #room-message.leaving .room-char {
      animation: room-char-scatter 0.34s steps(2, end) forwards;
      animation-delay: var(--scatter-delay);
    }

    @keyframes room-char-scatter {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg);
      }

      45% {
        opacity: 0.72;
        transform: translate(
          calc(var(--scatter-x) * 0.35),
          calc(var(--scatter-y) * 0.35)
        ) rotate(calc(var(--scatter-rotate) * 0.3));
        text-shadow:
          -1px 0 rgba(255, 55, 100, 0.3),
          1px 0 rgba(0, 220, 255, 0.3);
      }

      100% {
        opacity: 0;
        transform: translate(
          var(--scatter-x),
          var(--scatter-y)
        ) rotate(var(--scatter-rotate));
      }
    }

    #room-message.signal-cut {
      transform: translateX(-2px) skewX(-8deg);
      filter: brightness(1.8) contrast(1.5);
      text-shadow:
        -2px 0 rgba(255, 50, 90, 0.8),
        2px 0 rgba(0, 220, 255, 0.8);
    }

    #cut-flash {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          transparent 43%,
          rgba(255, 255, 255, 0.9) 44%,
          rgba(255, 255, 255, 0.9) 45%,
          transparent 46%,
          transparent 62%,
          rgba(255, 60, 110, 0.45) 63%,
          rgba(0, 220, 255, 0.45) 64%,
          transparent 65%
        );
    }

    #cut-flash.active {
      opacity: 1;
    }

    #screen-blackout {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: #000000;
      opacity: 0;
    }

    #screen-blackout.active {
      opacity: 1;
    }
  </style>
</head>

<body>
  <main class="room-stage">
    <p id="room-message" aria-live="polite"></p>
  </main>

  <div id="cut-flash" aria-hidden="true"></div>
  <div id="screen-blackout" aria-hidden="true"></div>

  <script>
    const entityRoomSessionKey = "welcome_entity_room_entered";

    let entityRoomAlreadyEntered = false;

    try {
      entityRoomAlreadyEntered =
        sessionStorage.getItem(entityRoomSessionKey) === "1";

      if (!entityRoomAlreadyEntered) {
        sessionStorage.setItem(entityRoomSessionKey, "1");
      }
    } catch (error) {
      entityRoomAlreadyEntered = false;
    }

    if (entityRoomAlreadyEntered) {
      window.location.replace("error.html");
    } else {
      const roomLines = [
        {
          text: "...여긴 왜 들어온 거야?",
          pauseAfterCharacter: 3,
          pauseDuration: 1450
        },
        {
          text: "거기 서서... 뭘 보고 있는 거야?",
          pauseAfterCharacter: 8,
          pauseDuration: 760
        },
        {
          text: "......"
        },
        {
          text: "왜 계속... 왜 계속",
          cutAfterCharacter: 9
        }
      ];

      const timingSettings = {
        firstLineBlackDelay: 3000,
        characterDelay: 320,
        scatterDuration: 340,
        transitionBlackGap: 1500,
        cutFlashDuration: 65,
        finalBlackHold: 2200
      };

      const roomMessage = document.getElementById("room-message");
      const cutFlash = document.getElementById("cut-flash");
      const screenBlackout = document.getElementById("screen-blackout");

      let currentLineIndex = 0;
      let characterIndex = 0;
      let canAdvance = false;
      let isTransitioning = false;

      function randomValue(maximum) {
        return ((Math.random() * 2 - 1) * maximum).toFixed(2);
      }

      function createShakingCharacter(character) {
        const span = document.createElement("span");

        span.className = "room-char";
        span.textContent = character === " " ? "\u00A0" : character;

        span.style.setProperty("--jx1", `${randomValue(0.8)}px`);
        span.style.setProperty("--jy1", `${randomValue(0.8)}px`);
        span.style.setProperty("--jx2", `${randomValue(0.8)}px`);
        span.style.setProperty("--jy2", `${randomValue(0.8)}px`);
        span.style.setProperty("--jx3", `${randomValue(0.8)}px`);
        span.style.setProperty("--jy3", `${randomValue(0.8)}px`);
        span.style.setProperty("--jx4", `${randomValue(0.8)}px`);
        span.style.setProperty("--jy4", `${randomValue(0.8)}px`);

        span.style.setProperty("--r1", `${randomValue(0.7)}deg`);
        span.style.setProperty("--r2", `${randomValue(0.7)}deg`);
        span.style.setProperty("--r3", `${randomValue(0.7)}deg`);
        span.style.setProperty("--r4", `${randomValue(0.7)}deg`);

        span.style.setProperty(
          "--jitter-duration",
          `${(0.42 + Math.random() * 0.7).toFixed(2)}s`
        );

        span.style.setProperty(
          "--jitter-delay",
          `${(-Math.random() * 1.2).toFixed(2)}s`
        );

        span.style.setProperty("--scatter-x", `${randomValue(4)}px`);
        span.style.setProperty("--scatter-y", `${randomValue(3.5)}px`);
        span.style.setProperty("--scatter-rotate", `${randomValue(1.8)}deg`);

        span.style.setProperty(
          "--scatter-delay",
          `${Math.floor(Math.random() * 70)}ms`
        );

        return span;
      }

      function getCurrentCharacters() {
        return Array.from(roomLines[currentLineIndex].text);
      }

      function startTypingCurrentLine() {
        roomMessage.className = "";
        roomMessage.textContent = "";

        characterIndex = 0;
        canAdvance = false;
        isTransitioning = false;

        const delayBeforeTyping =
          currentLineIndex === 0
            ? timingSettings.firstLineBlackDelay
            : 0;

        setTimeout(typeNextCharacter, delayBeforeTyping);
      }

      function typeNextCharacter() {
        const currentLine = roomLines[currentLineIndex];
        const characters = getCurrentCharacters();

        if (characterIndex >= characters.length) {
          canAdvance = true;
          return;
        }

        const character = characters[characterIndex];

        roomMessage.appendChild(
          createShakingCharacter(character)
        );

        characterIndex += 1;

        if (
          currentLine.cutAfterCharacter &&
          characterIndex === currentLine.cutAfterCharacter
        ) {
          setTimeout(
            startAbruptCut,
            timingSettings.cutFlashDuration
          );

          return;
        }

        let nextDelay = timingSettings.characterDelay;

        if (
          currentLine.pauseAfterCharacter &&
          characterIndex === currentLine.pauseAfterCharacter
        ) {
          nextDelay += currentLine.pauseDuration;
        }

        setTimeout(typeNextCharacter, nextDelay);
      }

      function returnToBinaryStage() {
        window.location.replace(
          "index.html?return=binary#binary-stage"
        );
      }

      function advanceToNextLine() {
        if (!canAdvance || isTransitioning) {
          return;
        }

        isTransitioning = true;
        canAdvance = false;

        roomMessage.classList.add("leaving");

        setTimeout(() => {
          roomMessage.textContent = "";

          setTimeout(() => {
            currentLineIndex += 1;
            startTypingCurrentLine();
          }, timingSettings.transitionBlackGap);
        }, timingSettings.scatterDuration);
      }

      function startAbruptCut() {
        if (isTransitioning) {
          return;
        }

        isTransitioning = true;
        canAdvance = false;

        roomMessage.classList.add("signal-cut");
        cutFlash.classList.add("active");

        setTimeout(() => {
          cutFlash.classList.remove("active");
          roomMessage.textContent = "";
          screenBlackout.classList.add("active");
        }, timingSettings.cutFlashDuration);

        setTimeout(() => {
          returnToBinaryStage();
        }, timingSettings.cutFlashDuration + timingSettings.finalBlackHold);
      }

      document.addEventListener("pointerup", () => {
        advanceToNextLine();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          advanceToNextLine();
        }
      });

      startTypingCurrentLine();
    }
  </script>
</body>
</html>
