<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title></title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=3") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=3") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    html,
    body,
    #room-message,
    .room-char {
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif !important;
      font-synthesis: none;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .room-stage {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진2 중앙 대사 글자 크기 변경 구역

      마지막 숫자 2.45rem을 줄이면 작아짐
      마지막 숫자 2.45rem을 늘리면 커짐
      ========================================================
    */

    #room-message {
      width: min(100%, 660px);
      margin: 0;
      color: #f5f5ff;

      font-size: clamp(1.5rem, 6vw, 2.45rem);

      font-weight: 400;
      line-height: 1.7;
      text-align: center;
      white-space: pre-wrap;

      /*
        ======================================================
        !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
        이진2 중앙 대사 자간 변경 구역

        숫자가 커질수록 글자 사이가 넓어짐
        ======================================================
      */
      letter-spacing: 0.07em;

      /* 이진1과 같은 은은한 흰빛 글로우 */
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.72),
        0 0 15px rgba(255, 255, 255, 0.38);
    }

    /*
      글자 하나하나를 이진수 코드와 동일한 방식으로
      제각각 미세하게 흔들리게 하는 부분
    */

    .room-char {
      display: inline-block;
      min-width: 0.01em;
      transform-origin: center;
      will-change: transform;
      animation:
        room-char-tremble var(--jitter-duration) steps(2, end)
        var(--jitter-delay) infinite;
    }

    @keyframes room-char-tremble {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      18% {
        transform: translate(var(--jx1), var(--jy1)) rotate(var(--r1));
      }

      39% {
        transform: translate(var(--jx2), var(--jy2)) rotate(var(--r2));
      }

      63% {
        transform: translate(var(--jx3), var(--jy3)) rotate(var(--r3));
      }

      82% {
        transform: translate(var(--jx4), var(--jy4)) rotate(var(--r4));
      }
    }

    /*
      화면을 터치해서 다음 대사로 넘길 때,
      현재 대사가 짧게 흔들리며 사라지는 효과
    */

    #room-message.leaving {
      animation: message-leave 0.42s steps(2, end) forwards;
    }

    @keyframes message-leave {
      0% {
        opacity: 1;
        transform: translate(0, 0);
      }

      20% {
        transform: translate(-3px, 1px);
      }

      45% {
        transform: translate(3px, -2px);
      }

      70% {
        transform: translate(-2px, 1px);
      }

      100% {
        opacity: 0;
        transform: translate(5px, 0);
      }
    }

    /*
      마지막 문장 뒤 화면을 누르면
      텍스트가 갑자기 사라지고 이진수 화면으로 복귀
    */

    #room-message.cut {
      animation: message-cut 0.22s steps(2, end) forwards;
    }

    @keyframes message-cut {
      0% {
        opacity: 1;
        transform: scaleX(1);
      }

      45% {
        opacity: 1;
        transform: scaleX(1.05);
      }

      100% {
        opacity: 0;
        transform: scaleX(0.02);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .room-char,
      #room-message.leaving,
      #room-message.cut {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="room-stage">
    <p id="room-message" aria-live="polite"></p>
  </main>

  <script>
    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진2 방 대사 수정 구역

      text 안의 문장만 바꾸면 됨.
      순서도 여기서 바꿀 수 있음.
      ========================================================
    */

    const roomLines = [
      "...여긴 왜 들어온 거야?",
      "거기 서서... 뭘 보고 있는 거야?",
      "......",
      "왜 계속... 왜 계속"
    ];

    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진2 타이핑 속도 변경 구역

      characterDelay 숫자가 커질수록 더 느려짐.
      지금은 이진1보다 느리게 설정됨.

      띄어쓰기 역시 한 글자로 계산되어
      딱. 딱. 딱. 딱. 나타남.
      ========================================================
    */

    const typingSettings = {
      startDelay: 950,
      characterDelay: 320
    };

    const roomMessage = document.getElementById("room-message");

    let currentLineIndex = 0;
    let characterIndex = 0;
    let canAdvance = false;
    let isTransitioning = false;

    function randomValue(maximum) {
      return ((Math.random() * 2 - 1) * maximum).toFixed(2);
    }

    function createShakingCharacter(character) {
      const span = document.createElement("span");

      span.className = "room-char";
      span.textContent = character === " " ? "\u00A0" : character;

      span.style.setProperty("--jx1", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy1", `${randomValue(0.8)}px`);
      span.style.setProperty("--jx2", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy2", `${randomValue(0.8)}px`);
      span.style.setProperty("--jx3", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy3", `${randomValue(0.8)}px`);
      span.style.setProperty("--jx4", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy4", `${randomValue(0.8)}px`);

      span.style.setProperty("--r1", `${randomValue(0.7)}deg`);
      span.style.setProperty("--r2", `${randomValue(0.7)}deg`);
      span.style.setProperty("--r3", `${randomValue(0.7)}deg`);
      span.style.setProperty("--r4", `${randomValue(0.7)}deg`);

      span.style.setProperty(
        "--jitter-duration",
        `${(0.42 + Math.random() * 0.7).toFixed(2)}s`
      );

      span.style.setProperty(
        "--jitter-delay",
        `${(-Math.random() * 1.2).toFixed(2)}s`
      );

      return span;
    }

    function startTypingCurrentLine() {
      const currentLine = roomLines[currentLineIndex];

      roomMessage.className = "";
      roomMessage.textContent = "";

      characterIndex = 0;
      canAdvance = false;
      isTransitioning = false;

      setTimeout(typeNextCharacter, typingSettings.startDelay);
    }

    function typeNextCharacter() {
      const currentLine = roomLines[currentLineIndex];

      if (characterIndex >= currentLine.length) {
        canAdvance = true;
        return;
      }

      roomMessage.appendChild(
        createShakingCharacter(currentLine[characterIndex])
      );

      characterIndex += 1;

      setTimeout(
        typeNextCharacter,
        typingSettings.characterDelay
      );
    }

    function returnToBinaryStage() {
      window.location.replace(
        "index.html?return=binary#binary-stage"
      );
    }

    function advanceToNextLine() {
      if (!canAdvance || isTransitioning) {
        return;
      }

      isTransitioning = true;
      canAdvance = false;

      const isFinalLine =
        currentLineIndex === roomLines.length - 1;

      if (isFinalLine) {
        roomMessage.classList.add("cut");

        setTimeout(() => {
          returnToBinaryStage();
        }, 240);

        return;
      }

      roomMessage.classList.add("leaving");

      setTimeout(() => {
        currentLineIndex += 1;
        startTypingCurrentLine();
      }, 440);
    }

    /*
      화면 어디를 터치하거나 클릭해도 다음 대사로 진행.
      타이핑이 끝나기 전 터치는 무시됨.
    */

    document.addEventListener("pointerup", () => {
      advanceToNextLine();
    });

    /*
      PC 테스트용:
      Enter 또는 Space를 눌러도 다음 대사로 진행.
    */

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        advanceToNextLine();
      }
    });

    startTypingCurrentLine();
  </script>
</body>
</html>
