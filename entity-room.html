<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title></title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=4") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=4") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #000000;
    }

    html,
    body,
    #room-message,
    .room-char {
      font-family: "DeterminationK2", "Noto Sans KR", -apple-system, system-ui, sans-serif !important;
      font-synthesis: none;
    }

    body {
      overflow: hidden;
      color: #ffffff;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .room-stage {
      display: grid;
      min-height: 100svh;
      padding: 34px;
      place-items: center;
    }

    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진2 중앙 대사 글자 크기 변경 구역

      마지막 숫자 2.45rem을 늘리면 커짐.
      마지막 숫자 2.45rem을 줄이면 작아짐.
      ========================================================
    */

    #room-message {
      width: min(100%, 660px);
      margin: 0;
      color: #f5f5ff;

      font-size: clamp(1.5rem, 6vw, 2.45rem);

      font-weight: 400;
      line-height: 1.7;
      text-align: center;
      white-space: pre-wrap;

      /*
        ======================================================
        !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
        이진2 중앙 대사 자간 변경 구역

        숫자가 커질수록 글자 사이가 넓어짐.
        ======================================================
      */
      letter-spacing: 0.07em;

      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.72),
        0 0 15px rgba(255, 255, 255, 0.38);
    }

    /*
      글자 하나하나가 이진수 코드처럼
      제각각 미세하게 떨리는 효과
    */

    .room-char {
      display: inline-block;
      min-width: 0.01em;
      transform-origin: center;
      animation:
        room-char-tremble var(--jitter-duration) steps(2, end)
        var(--jitter-delay) infinite;
    }

    @keyframes room-char-tremble {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      18% {
        transform: translate(var(--jx1), var(--jy1)) rotate(var(--r1));
      }

      39% {
        transform: translate(var(--jx2), var(--jy2)) rotate(var(--r2));
      }

      63% {
        transform: translate(var(--jx3), var(--jy3)) rotate(var(--r3));
      }

      82% {
        transform: translate(var(--jx4), var(--jy4)) rotate(var(--r4));
      }
    }

    /*
      다음 대사로 넘어갈 때:
      강한 흔들림 대신 글자들이 약하게 글리치처럼 흩어짐
    */

    #room-message.leaving .room-char,
    #room-message.final-leave .room-char {
      animation: room-char-scatter 0.42s steps(2, end) forwards;
      animation-delay: var(--scatter-delay);
    }

    @keyframes room-char-scatter {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg);
        text-shadow:
          0 0 5px rgba(255, 255, 255, 0.72),
          0 0 15px rgba(255, 255, 255, 0.38);
      }

      35% {
        opacity: 0.8;
        transform: translate(
          calc(var(--scatter-x) * 0.35),
          calc(var(--scatter-y) * 0.35)
        ) rotate(calc(var(--scatter-rotate) * 0.35));
        text-shadow:
          -1px 0 rgba(255, 55, 100, 0.35),
          1px 0 rgba(0, 220, 255, 0.35);
      }

      100% {
        opacity: 0;
        transform: translate(
          var(--scatter-x),
          var(--scatter-y)
        ) rotate(var(--scatter-rotate));
        text-shadow:
          -2px 0 rgba(255, 55, 100, 0.18),
          2px 0 rgba(0, 220, 255, 0.18);
      }
    }

    #screen-blackout {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: #000000;
      opacity: 0;
      transition: opacity 0.18s steps(2, end);
    }

    #screen-blackout.active {
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .room-char,
      #room-message.leaving .room-char,
      #room-message.final-leave .room-char {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="room-stage">
    <p id="room-message" aria-live="polite"></p>
  </main>

  <div id="screen-blackout" aria-hidden="true"></div>

  <script>
    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진2 방 대사 수정 구역

      text 안의 문장만 바꾸면 됨.
      ========================================================
    */

    const roomLines = [
      {
        text: "...여긴 왜 들어온 거야?",
        pauseAfterCharacter: 3
      },
      {
        text: "거기 서서... 뭘 보고 있는 거야?"
      },
      {
        text: "......"
      },
      {
        text: "왜 계속... 왜 계속",
        autoClose: true
      }
    ];

    /*
      ========================================================
      !!!!!!!!!! 여기에요 여기 !!!!!!!!!!
      이진2 시간 조절 구역

      firstLineBlackDelay
      첫 대사가 나오기 전 검은 화면 시간

      characterDelay
      글자 하나씩 나오는 속도

      ellipsisPause
      첫 대사의 ... 뒤 멈춤 시간

      transitionBlackGap
      화면 터치 후 다음 대사 전 검은 공백 시간

      finalBlackHold
      마지막 대사 후 완전 검정 화면 유지 시간
      ========================================================
    */

    const timingSettings = {
      firstLineBlackDelay: 3000,
      characterDelay: 320,
      ellipsisPause: 1450,
      scatterDuration: 420,
      transitionBlackGap: 500,
      finalWaitAfterTyping: 1100,
      finalBlackHold: 2600
    };

    const roomMessage = document.getElementById("room-message");
    const screenBlackout = document.getElementById("screen-blackout");

    let currentLineIndex = 0;
    let characterIndex = 0;
    let canAdvance = false;
    let isTransitioning = false;

    function randomValue(maximum) {
      return ((Math.random() * 2 - 1) * maximum).toFixed(2);
    }

    function createShakingCharacter(character) {
      const span = document.createElement("span");

      span.className = "room-char";
      span.textContent = character === " " ? "\u00A0" : character;

      span.style.setProperty("--jx1", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy1", `${randomValue(0.8)}px`);
      span.style.setProperty("--jx2", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy2", `${randomValue(0.8)}px`);
      span.style.setProperty("--jx3", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy3", `${randomValue(0.8)}px`);
      span.style.setProperty("--jx4", `${randomValue(0.8)}px`);
      span.style.setProperty("--jy4", `${randomValue(0.8)}px`);

      span.style.setProperty("--r1", `${randomValue(0.7)}deg`);
      span.style.setProperty("--r2", `${randomValue(0.7)}deg`);
      span.style.setProperty("--r3", `${randomValue(0.7)}deg`);
      span.style.setProperty("--r4", `${randomValue(0.7)}deg`);

      span.style.setProperty(
        "--jitter-duration",
        `${(0.42 + Math.random() * 0.7).toFixed(2)}s`
      );

      span.style.setProperty(
        "--jitter-delay",
        `${(-Math.random() * 1.2).toFixed(2)}s`
      );

      span.style.setProperty(
        "--scatter-x",
        `${randomValue(5.5)}px`
      );

      span.style.setProperty(
        "--scatter-y",
        `${randomValue(4.5)}px`
      );

      span.style.setProperty(
        "--scatter-rotate",
        `${randomValue(2.5)}deg`
      );

      span.style.setProperty(
        "--scatter-delay",
        `${Math.floor(Math.random() * 90)}ms`
      );

      return span;
    }

    function getCurrentCharacters() {
      return Array.from(roomLines[currentLineIndex].text);
    }

    function startTypingCurrentLine() {
      roomMessage.className = "";
      roomMessage.textContent = "";

      characterIndex = 0;
      canAdvance = false;
      isTransitioning = false;

      const delayBeforeTyping =
        currentLineIndex === 0
          ? timingSettings.firstLineBlackDelay
          : 0;

      setTimeout(typeNextCharacter, delayBeforeTyping);
    }

    function typeNextCharacter() {
      const currentLine = roomLines[currentLineIndex];
      const characters = getCurrentCharacters();

      if (characterIndex >= characters.length) {
        if (currentLine.autoClose) {
          setTimeout(
            startFinalSequence,
            timingSettings.finalWaitAfterTyping
          );
        } else {
          canAdvance = true;
        }

        return;
      }

      const character = characters[characterIndex];

      roomMessage.appendChild(
        createShakingCharacter(character)
      );

      characterIndex += 1;

      let nextDelay = timingSettings.characterDelay;

      if (
        currentLine.pauseAfterCharacter &&
        characterIndex === currentLine.pauseAfterCharacter
      ) {
        nextDelay += timingSettings.ellipsisPause;
      }

      setTimeout(typeNextCharacter, nextDelay);
    }

    function returnToBinaryStage() {
      window.location.replace(
        "index.html?return=binary#binary-stage"
      );
    }

    function advanceToNextLine() {
      if (!canAdvance || isTransitioning) {
        return;
      }

      isTransitioning = true;
      canAdvance = false;

      roomMessage.classList.add("leaving");

      setTimeout(() => {
        roomMessage.textContent = "";

        setTimeout(() => {
          currentLineIndex += 1;
          startTypingCurrentLine();
        }, timingSettings.transitionBlackGap);
      }, timingSettings.scatterDuration);
    }

    function startFinalSequence() {
      if (isTransitioning) {
        return;
      }

      isTransitioning = true;
      canAdvance = false;

      roomMessage.classList.add("final-leave");

      setTimeout(() => {
        roomMessage.textContent = "";
        screenBlackout.classList.add("active");
      }, timingSettings.scatterDuration);

      setTimeout(() => {
        returnToBinaryStage();
      }, timingSettings.scatterDuration + timingSettings.finalBlackHold);
    }

    /*
      타이핑이 끝난 뒤에만
      화면 터치로 다음 대사로 넘어감.
    */

    document.addEventListener("pointerup", () => {
      advanceToNextLine();
    });

    /*
      PC 테스트용:
      Enter 또는 Space도 터치와 동일하게 작동.
    */

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        advanceToNextLine();
      }
    });

    startTypingCurrentLine();
  </script>
</body>
</html>
